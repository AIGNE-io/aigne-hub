// ─── Provider Aliases & Normalization ─────────────────────────────────────────

const PROVIDER_ALIASES = {
  gemini: 'google',
  vertex_ai: 'google',
  vertex_ai_beta: 'google',
  google: 'google',
  anthropic: 'anthropic',
  openai: 'openai',
  'text-completion-openai': 'openai',
  chatgpt: 'openai',
  deepseek: 'deepseek',
  xai: 'xai',
  'x-ai': 'xai',
  openrouter: 'openrouter',
  volcengine: 'doubao',
};

const PROVIDER_TIERS = {
  tier1: ['openai', 'anthropic', 'google', 'xai', 'deepseek', 'doubao'],
  tier2: ['poe', 'openrouter', 'rock'],
};

const MODEL_NAME_OVERRIDES = {
  'gemini-flash-2.5': 'gemini-2.5-flash',
  'gpt-3.5-turbo-instruct': 'gpt-3.5-turbo-instruct',
};

const MODEL_PREFIX_TO_PROVIDER = {
  'claude-': 'anthropic',
  'gpt-': 'openai',
  'o1-': 'openai',
  'o3-': 'openai',
  'o4-': 'openai',
  'gemini-': 'google',
  'grok-': 'xai',
  'deepseek-': 'deepseek',
};

const PRICING_URLS = {
  anthropic: 'https://docs.anthropic.com/en/docs/about-claude/pricing',
  google: 'https://ai.google.dev/gemini-api/docs/pricing',
  deepseek: 'https://api-docs.deepseek.com/quick_start/pricing',
  xai: 'https://docs.x.ai/developers/models',
  openai: 'https://platform.openai.com/docs/pricing',
  doubao: 'https://www.volcengine.com/docs/82379/1544106',
  openrouter: 'https://openrouter.ai/models',
  bedrock: 'https://aws.amazon.com/bedrock/pricing/',
  ideogram: 'https://ideogram.ai/pricing',
  poe: 'https://poe.com/api/models',
};

const PROV_NAMES = {
  google: 'Google',
  openai: 'OpenAI',
  anthropic: 'Anthropic',
  deepseek: 'DeepSeek',
  xai: 'xAI',
  openrouter: 'OpenRouter',
  doubao: 'Doubao',
  ideogram: 'Ideogram',
  minimax: 'MiniMax',
  bedrock: 'Bedrock',
  poe: 'Poe',
};

function provName(p) {
  return PROV_NAMES[p.toLowerCase()] || p.charAt(0).toUpperCase() + p.slice(1);
}

/**
 * Normalize a provider name to the canonical DB provider name.
 * Tries exact match first, then prefix match (e.g. "vertex_ai_beta" via "vertex_ai").
 * Returns undefined if no match found.
 */
function normalizeProvider(name) {
  const lower = name.toLowerCase();
  if (PROVIDER_ALIASES[lower]) return PROVIDER_ALIASES[lower];
  for (const [alias, canonical] of Object.entries(PROVIDER_ALIASES)) {
    if (lower.startsWith(alias)) return canonical;
  }
  if (lower.startsWith('bedrock')) return 'bedrock';
  return undefined;
}

/**
 * Generate fallback model name variants for lookup.
 */
function modelNameFallbacks(model) {
  if (MODEL_NAME_OVERRIDES[model]) {
    return [MODEL_NAME_OVERRIDES[model]];
  }
  const fallbacks = [];
  // claude-xxx-N-0 → claude-xxx-N
  if (/^claude-.*-\d+-0$/.test(model)) {
    fallbacks.push(model.replace(/-0$/, ''));
  }
  // gpt-4o-2024-08-06 → gpt-4o (date suffix)
  const dateMatch = model.match(/^(.+)-(\d{4}-\d{2}-\d{2})$/);
  if (dateMatch?.[1]) {
    fallbacks.push(dateMatch[1]);
  }
  return fallbacks;
}

/**
 * For tier2 providers, resolve the underlying tier1 provider and model name.
 */
function resolveModelMapping(dbModel, dbProvider) {
  const canonicalProvider = normalizeProvider(dbProvider) || dbProvider;
  const isTier2 = PROVIDER_TIERS.tier2.includes(canonicalProvider);
  const resolvedModel = MODEL_NAME_OVERRIDES[dbModel] || dbModel;

  if (!isTier2) {
    return { primaryProvider: canonicalProvider, primaryModel: resolvedModel };
  }

  // OpenRouter: "anthropic/claude-sonnet-4" → split on /
  if (canonicalProvider === 'openrouter' && resolvedModel.includes('/')) {
    const slashIdx = resolvedModel.indexOf('/');
    const providerPrefix = resolvedModel.slice(0, slashIdx);
    const modelName = resolvedModel.slice(slashIdx + 1);
    const mappedProvider = normalizeProvider(providerPrefix);
    if (mappedProvider && PROVIDER_TIERS.tier1.includes(mappedProvider)) {
      return { primaryProvider: mappedProvider, primaryModel: modelName };
    }
  }

  // Poe and others: infer provider from model name prefix
  for (const [prefix, provider] of Object.entries(MODEL_PREFIX_TO_PROVIDER)) {
    if (resolvedModel.startsWith(prefix)) {
      return { primaryProvider: provider, primaryModel: resolvedModel };
    }
  }

  return { primaryProvider: canonicalProvider, primaryModel: resolvedModel };
}

/**
 * Derive resolution tiers for image models with per-image and per-image-token pricing.
 */
function deriveResolutionTiers(outputCostPerImage, outputCostPerImageToken) {
  if (outputCostPerImage == null || outputCostPerImageToken == null) return undefined;
  if (outputCostPerImageToken === 0) return undefined;

  const stdTokens = Math.round(outputCostPerImage / outputCostPerImageToken);
  const hiTokens = Math.round(stdTokens * 1.786);
  const stdCost = outputCostPerImage;
  const hiCost = outputCostPerImageToken * hiTokens;

  if (Math.abs(hiCost - stdCost) / stdCost <= 0.05) return undefined;

  return [
    { quality: '1K-2K', size: `~${stdTokens}tok`, costPerImage: stdCost },
    { quality: '4K', size: `~${hiTokens}tok`, costPerImage: hiCost },
  ];
}

// ─── Math Utilities ───────────────────────────────────────────────────────────

function calcDrift(dbValue, sourceValue) {
  const maxVal = Math.max(Math.abs(dbValue), Math.abs(sourceValue));
  if (maxVal === 0) return 0;
  return Math.abs(dbValue - sourceValue) / maxVal;
}

function calcMargin(sell, cost) {
  if (sell === undefined || sell === null || cost === undefined || cost === null || cost === 0) return undefined;
  return ((sell - cost) / cost) * 100;
}

function closeEnough(a, b, tol) {
  if (tol === undefined) tol = 0.02;
  return a != null && b != null && b !== 0 && Math.abs(a - b) / Math.abs(b) < tol;
}

function aboveOrClose(sell, cost, tol) {
  if (tol === undefined) tol = 0.005;
  return sell != null && cost != null && cost > 0 && sell >= cost * (1 - tol);
}

// ─── Formatting ───────────────────────────────────────────────────────────────

/**
 * Format a price value for display (plain text).
 * @param {number} v - price in $/token, $/image, or $/second
 * @param {string} unit - 'per-token' | 'per-image' | 'per-second'
 * @returns {string}
 */
function formatPrice(v, unit) {
  if (unit === undefined) unit = 'per-token';
  if (v === undefined || v === null) return '-';
  const n = Number(v);
  if (isNaN(n)) return '-';
  if (n === 0) return '$0';
  if (unit === 'per-image') return '$' + n.toFixed(4) + '/张';
  if (unit === 'per-second') return '$' + n.toFixed(4) + '/sec';
  // per-token: display as $/MTok
  const mtok = n * 1e6;
  if (mtok < 0.0001) return '$' + mtok.toFixed(7);
  if (mtok < 0.01) return '$' + mtok.toFixed(5);
  if (mtok < 1) return '$' + mtok.toFixed(3);
  if (mtok < 10) return '$' + mtok.toFixed(2);
  return '$' + mtok.toFixed(1);
}

/**
 * Format price as HTML (with <span class="na">-</span> for nulls).
 */
function formatPriceHtml(v, pricingUnit) {
  if (v === undefined || v === null) return '<span class="na">-</span>';
  if (v === 0) return '$0';
  if (pricingUnit === 'per-image') return '$' + Number(v).toFixed(4) + '/张';
  if (pricingUnit === 'per-second') return '$' + Number(v).toFixed(4) + '/sec';
  const p = v * 1e6;
  if (p < 0.0001) return '$' + p.toFixed(7);
  if (p < 0.01) return '$' + p.toFixed(5);
  if (p < 1) return '$' + p.toFixed(3);
  return '$' + p.toFixed(2);
}

// ─── Classification ───────────────────────────────────────────────────────────

function isPerUnitPricing(m) {
  return m.pricingUnit === 'per-image' || m.pricingUnit === 'per-second';
}

/**
 * Get the highest-tier costs for margin comparison.
 * For tiered pricing: use highest tier. For resolution tiers: use max costPerImage.
 */
function getMarginCosts(entry) {
  var costIn = entry.inputCostPerToken;
  var costOut = entry.outputCostPerToken;
  if (entry.tieredPricing && entry.tieredPricing.length) {
    var hi = entry.tieredPricing[entry.tieredPricing.length - 1];
    if (hi.input) costIn = hi.input;
    if (hi.output) costOut = hi.output;
  }
  if (entry.resolutionTiers && entry.resolutionTiers.length) {
    var maxCPI = 0;
    entry.resolutionTiers.forEach(function (t) {
      if (t.costPerImage > maxCPI) maxCPI = t.costPerImage;
    });
    if (maxCPI) costOut = maxCPI;
  }
  return { input: costIn, output: costOut };
}

/**
 * Check if a model has below-cost pricing (sell < cost).
 * @param {object} m - comparison result or entry+rate hybrid
 * @param {number} threshold - percentage threshold (default 2)
 */
function hasBelowCost(m, threshold) {
  if (threshold === undefined) threshold = 2;
  const isUnit = isPerUnitPricing(m);
  if ((m.outputMargin != null && m.outputMargin < -threshold) || (!isUnit && m.inputMargin != null && m.inputMargin < -threshold))
    return true;
  // Cache write: cost exists but sell is missing or below cost
  const cw = m.officialCacheWrite ?? m.litellmCacheWrite;
  const sw = m.dbCacheWrite;
  if (cw > 0 && (!sw || ((sw - cw) / cw) * 100 < -threshold)) return true;
  // Cache read: cost exists but sell is missing or below cost
  const cr = m.officialCacheRead ?? m.litellmCacheRead;
  const sr = m.dbCacheRead;
  if (cr > 0 && (!sr || ((sr - cr) / cr) * 100 < -threshold)) return true;
  return false;
}

/**
 * Check if a model has sell price drift (DB sell vs best-cost margin exceeds threshold).
 */
function hasDrift(m, threshold) {
  if (threshold === undefined) threshold = 2;
  const isUnit = isPerUnitPricing(m);
  const inputOff = !isUnit && m.inputMargin != null && Math.abs(m.inputMargin) > threshold;
  const outputOff = m.outputMargin != null && Math.abs(m.outputMargin) > threshold;
  if (inputOff || outputOff) return true;
  if (m.cacheTierWriteDrift > 0 || m.cacheTierReadDrift > 0) return true;
  // Cache read/write: DB value vs external reference (bidirectional)
  const cw = m.officialCacheWrite ?? m.litellmCacheWrite;
  if (cw > 0 && m.dbCacheWrite > 0) {
    if (Math.abs(((m.dbCacheWrite - cw) / cw) * 100) > threshold) return true;
  }
  const cr = m.officialCacheRead ?? m.litellmCacheRead;
  if (cr > 0 && m.dbCacheRead > 0) {
    if (Math.abs(((m.dbCacheRead - cr) / cr) * 100) > threshold) return true;
  }
  return false;
}

/**
 * Check if sell price is not at highest tier (potential loss at high volume).
 */
function hasNotHighestTier(m) {
  const sO = m.outputRate ?? m.dbOutput;
  const sI = m.inputRate ?? m.dbInput;
  if (m.tieredPricing?.length) {
    const hi = m.tieredPricing[m.tieredPricing.length - 1];
    if (!aboveOrClose(sO, hi.output) || (!isPerUnitPricing(m) && !aboveOrClose(sI, hi.input))) return true;
  }
  if (m.resolutionTiers?.length) {
    const maxCost = Math.max(...m.resolutionTiers.map((t) => t.costPerImage));
    if (!aboveOrClose(sO, maxCost)) return true;
  }
  if (m.officialCacheTiers?.length) {
    const writeTiers = m.officialCacheTiers.filter((t) => t.label.includes('write'));
    if (writeTiers.length > 1) {
      const maxWrite = Math.max(...writeTiers.map((t) => t.costPerToken));
      const dbCW = m.dbCacheWrite ?? 0;
      if (!aboveOrClose(dbCW, maxWrite)) return true;
    }
  }
  return false;
}

function hasNoData(m) {
  return (
    !m.bestCostOutput &&
    !m.bestCostInput &&
    !m.providerPageInput &&
    !m.litellmInput &&
    !m.openrouterInput &&
    !m.litellmOutputPerImage &&
    !m.litellmOutputPerSecond
  );
}

function hasNoOfficial(m) {
  return (
    m.providerPageInput === undefined &&
    m.providerPageOutput === undefined &&
    !(m.provider === 'openrouter' && m.openrouterInput !== undefined)
  );
}

/**
 * Classify a model into one of: 'below-cost' | 'drift' | 'no-match' | 'normal'.
 */
function classifyModel(m) {
  if (hasBelowCost(m) || hasNotHighestTier(m)) return 'below-cost';
  if (hasDrift(m)) return 'drift';
  if (hasNoOfficial(m) || hasNoData(m)) return 'no-match';
  return 'normal';
}

/**
 * Classify and group models into 4 sections.
 * Returns { belowCost, drift, noMatch, normal } arrays.
 */
function classifyAndGroup(models) {
  const belowCost = [];
  const drift = [];
  const noMatch = [];
  const normal = [];
  const belowCostKeys = new Set();
  const driftKeys = new Set();

  // Pass 1: below-cost
  for (const m of models) {
    if (hasBelowCost(m) || hasNotHighestTier(m)) {
      belowCost.push(m);
      belowCostKeys.add(`${m.provider}/${m.model}`);
    }
  }
  // Pass 2: drift
  for (const m of models) {
    const key = `${m.provider}/${m.model}`;
    if (!belowCostKeys.has(key) && hasDrift(m)) {
      drift.push(m);
      driftKeys.add(key);
    }
  }
  // Pass 3: no-match
  for (const m of models) {
    const key = `${m.provider}/${m.model}`;
    if (!belowCostKeys.has(key) && !driftKeys.has(key) && (hasNoOfficial(m) || hasNoData(m))) {
      noMatch.push(m);
    }
  }
  // Pass 4: normal (everything else)
  const usedKeys = new Set([...belowCostKeys, ...driftKeys, ...noMatch.map((m) => `${m.provider}/${m.model}`)]);
  for (const m of models) {
    if (!usedKeys.has(`${m.provider}/${m.model}`)) {
      normal.push(m);
    }
  }

  return { belowCost, drift, noMatch, normal };
}

/**
 * Recalculate classification from entry (cost data) + rate (sell data).
 * Used by client-side recategorization after DB refresh.
 */
function classifyFromEntryAndRate(entry, rate, isNoOfficial) {
  const isUnit = entry.modelType === 'imageGeneration' || entry.modelType === 'video';
  const sI = rate.inputRate, sO = rate.outputRate;

  // Use bestCost (actual wholesale cost) if available, fall back to getMarginCosts (highest tier)
  const mc = getMarginCosts(entry);
  const cI = entry.bestCostInput || mc.input;
  const cO = entry.bestCostOutput || mc.output;
  const mI = !isUnit && cI ? ((sI - cI) / cI) * 100 : null;
  const mO = cO ? ((sO - cO) / cO) * 100 : null;
  const DTH = 2;

  const ct = entry.cacheTiers || [];
  const wt = ct.filter(function (t) { return t.label.indexOf('write') >= 0; });
  const rc = entry.officialCacheRead || entry.litellmCacheRead || entry.cachedInputCostPerToken || 0;
  const mwc = wt.length ? Math.max(...wt.map(function (t) { return t.costPerToken; })) : 0;
  const sCW = rate.cacheWriteRate || 0, sCR = rate.cacheReadRate || 0;

  // Below-cost check
  var bc = false;
  if (mO != null && mO < -DTH) bc = true;
  if (!isUnit && mI != null && mI < -DTH) bc = true;
  if (mwc > 0 && (!sCW || ((sCW - mwc) / mwc * 100) < -DTH)) bc = true;
  if (rc > 0 && (!sCR || ((sCR - rc) / rc * 100) < -DTH)) bc = true;

  // Not-highest-tier check
  var nht = false;
  if (entry.tieredPricing && entry.tieredPricing.length) {
    var hi = entry.tieredPricing[entry.tieredPricing.length - 1];
    if (!aboveOrClose(sO, hi.output) || (!isUnit && !aboveOrClose(sI, hi.input))) nht = true;
  }
  if (entry.resolutionTiers && entry.resolutionTiers.length) {
    var mx = Math.max(...entry.resolutionTiers.map(function (t) { return t.costPerImage; }));
    if (!aboveOrClose(sO, mx)) nht = true;
  }
  if (wt.length > 1) {
    var mw = Math.max(...wt.map(function (t) { return t.costPerToken; }));
    if (!aboveOrClose(sCW, mw)) nht = true;
  }

  if (bc || nht) return 'below-cost';

  // Drift check — bidirectional for cache (both overpriced and underpriced)
  var dr = false;
  if (!isUnit && mI != null && Math.abs(mI) > DTH) dr = true;
  if (mO != null && Math.abs(mO) > DTH) dr = true;
  if (mwc > 0 && sCW > 0 && Math.abs(((sCW - mwc) / mwc) * 100) > DTH) dr = true;
  if (rc > 0 && sCR > 0 && Math.abs(((sCR - rc) / rc) * 100) > DTH) dr = true;
  if (dr) return 'drift';

  if (isNoOfficial) return 'no-match';
  return 'normal';
}

// ─── Type-aware Official Pricing Lookup ──────────────────────────────────────

/**
 * Check if a cache entry's modelType is compatible with a DB rate's type.
 */
function isTypeCompatible(dbType, cacheType) {
  if (!cacheType || !dbType) return true;
  if (dbType === cacheType) return true;
  if ((dbType === 'chatCompletion' && cacheType === 'fineTuning') || (dbType === 'fineTuning' && cacheType === 'chatCompletion'))
    return false;
  if ((dbType === 'chatCompletion' && cacheType === 'imageGeneration') || (dbType === 'imageGeneration' && cacheType === 'chatCompletion'))
    return false;
  if ((dbType === 'chatCompletion' && cacheType === 'audio') || (dbType === 'audio' && cacheType === 'chatCompletion'))
    return false;
  return true;
}

/**
 * Look up official pricing with type awareness.
 * @param {Map} cache
 * @param {string} lookupKey
 * @param {string[]} fallbackKeys
 * @param {string} dbType
 */
function lookupOfficialPricing(cache, lookupKey, fallbackKeys, dbType) {
  if (dbType) {
    const typed = cache.get(`${lookupKey}::${dbType}`);
    if (typed) return typed;
  }
  const base = cache.get(lookupKey);
  if (base && isTypeCompatible(dbType, base.modelType)) return base;

  for (const fbKey of fallbackKeys) {
    if (dbType) {
      const typed = cache.get(`${fbKey}::${dbType}`);
      if (typed) return typed;
    }
    const fb = cache.get(fbKey);
    if (fb && isTypeCompatible(dbType, fb.modelType)) return fb;
  }
  return undefined;
}

// ─── Best Cost Selection ─────────────────────────────────────────────────────

/**
 * Select the best cost source and calculate margins.
 * Mutates `result` in place.
 */
function pickBestCost(result) {
  if (result.pricingUnit === 'per-image' || result.pricingUnit === 'per-second') {
    if (result.pricingUnit === 'per-image' && result.resolutionTiers?.length) {
      result.bestCostOutput = Math.max(...result.resolutionTiers.map((t) => t.costPerImage));
    } else if (result.pricingUnit === 'per-image' && result.litellmOutputPerImage !== undefined) {
      result.bestCostOutput = result.litellmOutputPerImage;
    } else if (result.pricingUnit === 'per-second' && result.litellmOutputPerSecond !== undefined) {
      result.bestCostOutput = result.litellmOutputPerSecond;
    }

    if (result.pricingUnit === 'per-image' && result.providerPageOutput !== undefined && !result.bestCostOutput) {
      result.bestCostOutput = result.providerPageOutput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    } else if (result.pricingUnit === 'per-second' && result.providerPageOutput !== undefined && !result.bestCostOutput) {
      result.bestCostOutput = result.providerPageOutput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    }

    if (result.pricingUnit === 'per-image' && result.litellmInputPerImage !== undefined) {
      result.bestCostInput = result.litellmInputPerImage;
      if (!result.bestCostSource) {
        result.bestCostSource = 'litellm';
        result.bestCostSourceLabel = 'LiteLLM';
      }
    } else if (result.providerPageInput !== undefined) {
      result.bestCostInput = result.providerPageInput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    } else if (result.openrouterInput !== undefined) {
      result.bestCostInput = result.openrouterInput;
      result.bestCostSource = 'openrouter';
      result.bestCostSourceLabel = 'OpenRouter';
    } else if (result.litellmInput !== undefined) {
      result.bestCostInput = result.litellmInput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    }
    if (result.bestCostOutput !== undefined && !result.bestCostSource) {
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    }
  } else {
    if (result.providerPageInput !== undefined && result.providerPageOutput !== undefined) {
      result.bestCostInput = result.providerPageInput;
      result.bestCostOutput = result.providerPageOutput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    } else if (result.openrouterInput !== undefined && result.openrouterOutput !== undefined) {
      result.bestCostInput = result.openrouterInput;
      result.bestCostOutput = result.openrouterOutput;
      result.bestCostSource = 'openrouter';
      result.bestCostSourceLabel = 'OpenRouter';
    } else if (result.litellmInput !== undefined && result.litellmOutput !== undefined) {
      result.bestCostInput = result.litellmInput;
      result.bestCostOutput = result.litellmOutput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    }
  }

  if (result.bestCostInput !== undefined && result.inputRate !== undefined && result.bestCostInput > 0) {
    result.inputMargin = ((result.inputRate - result.bestCostInput) / result.bestCostInput) * 100;
  }
  if (result.bestCostOutput !== undefined && result.outputRate !== undefined && result.bestCostOutput > 0) {
    result.outputMargin = ((result.outputRate - result.bestCostOutput) / result.bestCostOutput) * 100;
  }
}

// ─── Core Compare Engine ─────────────────────────────────────────────────────

/**
 * Compare DB rates against external sources and produce structured comparison results.
 * @param {Array} dbRates
 * @param {Map} litellm
 * @param {Map} openrouter
 * @param {Map} providerPages - official pricing cache
 * @param {number} threshold
 * @returns {Array} ComparisonResult[]
 */
function compare(dbRates, litellm, openrouter, providerPages, threshold) {
  const results = [];

  for (const rate of dbRates) {
    const providerName = rate.provider?.name || '';
    const lookupKey = providerName === 'openrouter' ? rate.model : `${providerName}/${rate.model}`;
    const dbInput = Number(rate.unitCosts?.input ?? rate.inputRate ?? 0);
    const dbOutput = Number(rate.unitCosts?.output ?? rate.outputRate ?? 0);

    const modelFallbacks = modelNameFallbacks(rate.model);
    const fallbackKeys = modelFallbacks.map((m) => (providerName === 'openrouter' ? m : `${providerName}/${m}`));

    // LiteLLM lookup with fallbacks
    let ll = litellm.get(lookupKey);
    if (!ll && providerName === 'openrouter') {
      ll = litellm.get(`openrouter/${rate.model}`);
    }
    if (!ll) {
      const modelOnly = rate.model;
      for (const tryProvider of ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai']) {
        const found = litellm.get(`${tryProvider}/${modelOnly}`);
        if (found) { ll = found; break; }
      }
    }
    if (!ll) {
      for (const fbKey of fallbackKeys) {
        ll = litellm.get(fbKey);
        if (ll) break;
      }
      if (!ll) {
        for (const fbModel of modelFallbacks) {
          for (const tryProvider of ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai']) {
            ll = litellm.get(`${tryProvider}/${fbModel}`);
            if (ll) break;
          }
          if (ll) break;
        }
      }
    }

    const or = openrouter.get(lookupKey) ??
      fallbackKeys.reduce((found, k) => found ?? openrouter.get(k), undefined);

    const pp = lookupOfficialPricing(providerPages, lookupKey, fallbackKeys, rate.type);

    const pricingUnit = rate.type === 'imageGeneration' ? 'per-image' : rate.type === 'video' ? 'per-second' : 'per-token';
    const isPerUnit = pricingUnit !== 'per-token';

    let maxDrift = 0;
    const result = {
      provider: providerName,
      model: rate.model,
      type: rate.type,
      pricingUnit,
      dbInput,
      dbOutput,
      maxDrift: 0,
      exceedsThreshold: false,
      hasPricingIssue: false,
    };

    if (ll) {
      result.litellmInput = ll.inputCostPerToken;
      result.litellmOutput = ll.outputCostPerToken;
      if (ll.tieredPricing) result.tieredPricing = ll.tieredPricing;
      if (ll.resolutionTiers) result.resolutionTiers = ll.resolutionTiers;

      if (pricingUnit === 'per-image' && !result.resolutionTiers && ll.outputCostPerImage != null && ll.outputCostPerImageToken != null) {
        const derived = deriveResolutionTiers(ll.outputCostPerImage, ll.outputCostPerImageToken);
        if (derived) result.resolutionTiers = derived;
      }

      if (pricingUnit === 'per-image') {
        const llOutputPerImage = ll.outputCostPerImage ?? ll.inputCostPerImage;
        if (ll.inputCostPerImage !== undefined) result.litellmInputPerImage = ll.inputCostPerImage;
        if (llOutputPerImage !== undefined) {
          result.litellmOutputPerImage = llOutputPerImage;
          const outputDrift = calcDrift(dbOutput, llOutputPerImage);
          const inputDrift = ll.inputCostPerToken !== undefined && dbInput > 0 ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
          result.litellmDrift = Math.max(inputDrift, outputDrift);
        } else {
          const inputDrift = ll.inputCostPerToken !== undefined ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
          result.litellmDrift = inputDrift;
        }
      } else if (pricingUnit === 'per-second') {
        const llOutputPerSecond = ll.outputCostPerVideoPerSecond;
        if (llOutputPerSecond !== undefined) {
          result.litellmOutputPerSecond = llOutputPerSecond;
          result.litellmDrift = calcDrift(dbOutput, llOutputPerSecond);
        } else {
          result.litellmDrift = 0;
        }
      } else {
        const inputDrift = ll.inputCostPerToken !== undefined ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
        const outputDrift = ll.outputCostPerToken !== undefined ? calcDrift(dbOutput, ll.outputCostPerToken) : 0;
        result.litellmDrift = Math.max(inputDrift, outputDrift);
      }
      if (result.litellmDrift !== undefined) {
        maxDrift = Math.max(maxDrift, result.litellmDrift);
      }
    }

    if (or && or.inputCostPerToken !== undefined && or.outputCostPerToken !== undefined) {
      const inputDrift = calcDrift(dbInput, or.inputCostPerToken);
      result.openrouterInput = or.inputCostPerToken;
      result.openrouterOutput = or.outputCostPerToken;
      if (isPerUnit) {
        result.openrouterDrift = inputDrift;
      } else {
        const outputDrift = calcDrift(dbOutput, or.outputCostPerToken);
        result.openrouterDrift = Math.max(inputDrift, outputDrift);
      }
      maxDrift = Math.max(maxDrift, result.openrouterDrift);
    }

    const dbCacheWrite = rate.caching ? Number(rate.caching.writeRate ?? 0) : 0;
    const dbCacheRead = rate.caching ? Number(rate.caching.readRate ?? 0) : 0;

    if (pp) {
      if (pricingUnit === 'per-image' && pp.costPerImage != null) {
        result.providerPageOutput = pp.costPerImage;
        result.providerPageDrift = calcDrift(dbOutput, pp.costPerImage);
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pricingUnit === 'per-second' && pp.costPerSecond != null) {
        result.providerPageOutput = pp.costPerSecond;
        result.providerPageDrift = calcDrift(dbOutput, pp.costPerSecond);
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pp.inputCostPerToken != null && pp.outputCostPerToken != null) {
        const inputDrift = calcDrift(dbInput, pp.inputCostPerToken);
        result.providerPageInput = pp.inputCostPerToken;
        result.providerPageOutput = pp.outputCostPerToken;
        if (isPerUnit) {
          result.providerPageDrift = inputDrift;
        } else {
          const outputDrift = calcDrift(dbOutput, pp.outputCostPerToken);
          result.providerPageDrift = Math.max(inputDrift, outputDrift);
        }
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pp.inputCostPerToken != null || pp.outputCostPerToken != null) {
        result.providerPageInput = pp.inputCostPerToken;
        result.providerPageOutput = pp.outputCostPerToken;
        result.providerPageUrl = pp.sourceUrl;
        if (pp.outputCostPerToken != null) {
          result.providerPageDrift = calcDrift(dbOutput, pp.outputCostPerToken);
          maxDrift = Math.max(maxDrift, result.providerPageDrift);
        }
      }

      if (pp.cacheTiers?.length) {
        result.officialCacheTiers = pp.cacheTiers;
        const readTiers = pp.cacheTiers.filter((t) => t.label === 'read' || t.label === 'cached-input');
        const writeTiers = pp.cacheTiers.filter((t) => t.label.includes('write'));
        const maxWriteCost = writeTiers.length > 0 ? Math.max(...writeTiers.map((t) => t.costPerToken)) : 0;
        const maxReadCost = readTiers.length > 0 ? Math.max(...readTiers.map((t) => t.costPerToken)) : 0;
        if (maxWriteCost > 0) result.officialCacheWrite = maxWriteCost;
        if (maxReadCost > 0) result.officialCacheRead = maxReadCost;
      } else if (pp.cachedInputCostPerToken !== undefined) {
        result.officialCacheRead = pp.cachedInputCostPerToken;
      }
    }

    if (dbCacheWrite > 0 || dbCacheRead > 0) {
      result.dbCacheWrite = dbCacheWrite;
      result.dbCacheRead = dbCacheRead;
    }
    if (ll && (ll.cacheWriteCostPerToken !== undefined || ll.cacheReadCostPerToken !== undefined)) {
      result.litellmCacheWrite = ll.cacheWriteCostPerToken;
      result.litellmCacheRead = ll.cacheReadCostPerToken;

      const hasOfficialCacheTiers = (result.officialCacheTiers?.length ?? 0) > 0;
      if (!hasOfficialCacheTiers) {
        let cDrift = 0;
        if (dbCacheWrite > 0 && ll.cacheWriteCostPerToken !== undefined && ll.cacheWriteCostPerToken > 0) {
          cDrift = Math.max(cDrift, calcDrift(dbCacheWrite, ll.cacheWriteCostPerToken));
        }
        if (dbCacheRead > 0 && ll.cacheReadCostPerToken !== undefined && ll.cacheReadCostPerToken > 0) {
          cDrift = Math.max(cDrift, calcDrift(dbCacheRead, ll.cacheReadCostPerToken));
        }
        if (cDrift > 0) {
          result.cacheDrift = cDrift;
          maxDrift = Math.max(maxDrift, cDrift);
        }
      }
    }

    if (result.tieredPricing?.length && pricingUnit === 'per-token') {
      const maxTierInput = Math.max(...result.tieredPricing.map((t) => t.input ?? 0));
      const maxTierOutput = Math.max(...result.tieredPricing.map((t) => t.output ?? 0));
      if (maxTierInput > dbInput && dbInput > 0) {
        result.tierMaxInput = maxTierInput;
        result.tierInputDrift = calcDrift(dbInput, maxTierInput);
        maxDrift = Math.max(maxDrift, result.tierInputDrift);
      }
      if (maxTierOutput > dbOutput && dbOutput > 0) {
        result.tierMaxOutput = maxTierOutput;
        result.tierOutputDrift = calcDrift(dbOutput, maxTierOutput);
        maxDrift = Math.max(maxDrift, result.tierOutputDrift);
      }
    }

    if (result.officialCacheTiers?.length) {
      const writeTiers = result.officialCacheTiers.filter((t) => t.label.includes('write'));
      const readTiers = result.officialCacheTiers.filter((t) => t.label === 'read' || t.label === 'cached-input');

      if (writeTiers.length > 0) {
        const maxWriteCost = Math.max(...writeTiers.map((t) => t.costPerToken));
        if (dbCacheWrite > 0 && dbCacheWrite < maxWriteCost) {
          const drift = calcDrift(dbCacheWrite, maxWriteCost);
          if (drift > 1e-6) {
            result.cacheTierMaxWrite = maxWriteCost;
            result.cacheTierWriteDrift = drift;
            maxDrift = Math.max(maxDrift, drift);
          }
        } else if ((dbCacheWrite === 0 || dbCacheWrite === undefined) && maxWriteCost > 0) {
          result.cacheTierMaxWrite = maxWriteCost;
          result.cacheTierWriteDrift = 1;
          maxDrift = Math.max(maxDrift, 1);
        }
      }

      if (readTiers.length > 0) {
        const maxReadCost = Math.max(...readTiers.map((t) => t.costPerToken));
        if (dbCacheRead > 0 && dbCacheRead < maxReadCost) {
          const drift = calcDrift(dbCacheRead, maxReadCost);
          if (drift > 1e-6) {
            result.cacheTierMaxRead = maxReadCost;
            result.cacheTierReadDrift = drift;
            maxDrift = Math.max(maxDrift, drift);
          }
        } else if ((dbCacheRead === 0 || dbCacheRead === undefined) && maxReadCost > 0) {
          result.cacheTierMaxRead = maxReadCost;
          result.cacheTierReadDrift = 1;
          maxDrift = Math.max(maxDrift, 1);
        }
      }
    }

    result.maxDrift = maxDrift;
    result.exceedsThreshold = maxDrift > threshold;

    if (rate.unitCosts && (rate.inputRate || rate.outputRate)) {
      const unitInputCost = Number(rate.unitCosts.input);
      const unitOutputCost = Number(rate.unitCosts.output);
      const inputRate = Number(rate.inputRate ?? 0);
      const outputRate = Number(rate.outputRate ?? 0);
      result.inputRate = inputRate;
      result.outputRate = outputRate;
      if (unitInputCost > 0 && inputRate > 0) {
        result.inputRateIssue = ((inputRate - unitInputCost) / unitInputCost) * 100;
      }
      if (unitOutputCost > 0 && outputRate > 0) {
        result.outputRateIssue = ((outputRate - unitOutputCost) / unitOutputCost) * 100;
      }
      const PRICING_TOLERANCE = 2;
      result.hasPricingIssue =
        (result.inputRateIssue !== undefined && Math.abs(result.inputRateIssue) > PRICING_TOLERANCE) ||
        (result.outputRateIssue !== undefined && Math.abs(result.outputRateIssue) > PRICING_TOLERANCE);
    } else {
      result.hasPricingIssue = false;
    }

    pickBestCost(result);
    results.push(result);
  }

  results.sort((a, b) => b.maxDrift - a.maxDrift);
  return results;
}

// ─── Unmatched Official Models (Reverse Lookup) ──────────────────────────────

/**
 * Find official pricing entries that exist in the cache but have no corresponding DB model.
 * Models must also exist in LiteLLM data to be included (dual-source confirmation).
 */
function findUnmatchedOfficialModels(dbRates, officialCache, litellm) {
  const tier2Set = new Set(PROVIDER_TIERS.tier2);
  const relevantProviders = new Set();
  const matchedKeys = new Set();
  const LITELLM_PROVIDERS = ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai'];

  for (const rate of dbRates) {
    const providerName = rate.provider?.name || '';
    const { primaryProvider, primaryModel } = resolveModelMapping(rate.model, providerName);
    if (!tier2Set.has(primaryProvider)) {
      relevantProviders.add(primaryProvider);
    }
    const baseKey = `${primaryProvider}/${primaryModel}`;
    matchedKeys.add(baseKey);
    const fallbacks = modelNameFallbacks(primaryModel);
    for (const fb of fallbacks) {
      matchedKeys.add(`${primaryProvider}/${fb}`);
    }
    if (providerName && providerName !== primaryProvider) {
      matchedKeys.add(`${providerName}/${rate.model}`);
    }
  }

  function lookupLiteLLM(provider, modelId) {
    let ll = litellm.get(`${provider}/${modelId}`);
    if (ll) return ll;
    for (const tryProv of LITELLM_PROVIDERS) {
      const norm = normalizeProvider(tryProv);
      if (norm === provider || tryProv === provider) {
        ll = litellm.get(`${tryProv}/${modelId}`);
        if (ll) return ll;
      }
    }
    const fallbacks = modelNameFallbacks(modelId);
    for (const fb of fallbacks) {
      ll = litellm.get(`${provider}/${fb}`);
      if (ll) return ll;
      for (const tryProv of LITELLM_PROVIDERS) {
        const norm = normalizeProvider(tryProv);
        if (norm === provider || tryProv === provider) {
          ll = litellm.get(`${tryProv}/${fb}`);
          if (ll) return ll;
        }
      }
    }
    return undefined;
  }

  const unmatched = [];
  for (const [key, entry] of officialCache) {
    if (key.includes('::')) continue;
    if (!relevantProviders.has(entry.provider)) continue;
    if (matchedKeys.has(key)) continue;
    const ll = lookupLiteLLM(entry.provider, entry.modelId);
    if (!ll) continue;
    unmatched.push({
      ...entry,
      litellmInput: ll.inputCostPerToken,
      litellmOutput: ll.outputCostPerToken,
      litellmCacheWrite: ll.cacheWriteCostPerToken,
      litellmCacheRead: ll.cacheReadCostPerToken,
    });
  }
  return unmatched;
}

// ─── Official Pricing Cache Builder ──────────────────────────────────────────

/**
 * Build a Map from an OfficialPricingCache entries array.
 * Same logic as loadOfficialPricingCache in fetch-sources.ts.
 */
function buildOfficialPricingMap(entries) {
  const map = new Map();
  for (const entry of entries) {
    const id = entry.modelId || entry.model;
    if (!id) continue;
    const baseKey = `${entry.provider}/${id}`;
    if (entry.modelType) {
      map.set(`${baseKey}::${entry.modelType}`, entry);
    }
    const existing = map.get(baseKey);
    if (!existing || (existing.modelType !== 'chatCompletion' && entry.modelType === 'chatCompletion')) {
      map.set(baseKey, entry);
    }
  }
  return map;
}


// ─── Inlined Browser Fetchers ────────────────────────────────────────────────
/**
 * Browser-side Data Fetchers — uses native fetch() API.
 *
 * Rules:
 * - Pure .mjs — no external dependencies
 * - Expects pricing-core.mjs functions to be available in scope (inlined before this)
 * - All functions use `export function` syntax (stripped when inlined)
 */

// ─── Hub DB Rates ────────────────────────────────────────────────────────────

/**
 * Fetch DB rates from Hub API (paginated).
 * @param {string} hubUrl - Hub base URL
 * @param {string} [token] - Auth token (optional for read)
 * @returns {Promise<Array>} DbRate-like objects
 */
async function fetchDbRatesBrowser(hubUrl, token) {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const all = [];
  let page = 1;
  while (true) {
    const resp = await fetch(hubUrl + '/api/ai-providers/model-rates?pageSize=100&page=' + page, { headers });
    if (!resp.ok) {
      const txt = await resp.text().catch(function () { return resp.statusText; });
      throw new Error('DB rates: HTTP ' + resp.status + ': ' + txt.slice(0, 200));
    }
    const data = await resp.json();
    const list = data.list || data.data?.list || [];
    all.push(...list);
    if (list.length < 100) break;
    page++;
  }
  return all;
}

// ─── LiteLLM ─────────────────────────────────────────────────────────────────

const LITELLM_RAW_URL = 'https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json';

/**
 * Fetch LiteLLM pricing data and build a Map<string, ExternalRate>.
 * @returns {Promise<Map<string, object>>}
 */
async function fetchLiteLLMBrowser() {
  const map = new Map();
  const resolutionVariants = new Map();

  const resp = await fetch(LITELLM_RAW_URL);
  if (!resp.ok) throw new Error('LiteLLM: HTTP ' + resp.status);
  const data = await resp.json();

  for (const [key, val] of Object.entries(data)) {
    if (key === 'sample_spec') continue;

    // Resolution variant keys
    const resMatch = key.match(/^(?:azure\/)?(\w+)\/([\dx-]+)\/(.+)$/);
    if (resMatch && val.mode === 'image_generation') {
      const [, quality, sizeRaw, baseModel] = resMatch;
      const size = sizeRaw.replace(/-/g, '');
      const cost =
        (val.input_cost_per_image ?? val.output_cost_per_image ?? val.input_cost_per_pixel)
          ? (val.input_cost_per_pixel || 0) *
            sizeRaw.split('-x-').reduce((a, b) => a * parseInt(b), 1)
          : undefined;
      if (cost !== undefined) {
        const litellmProvider = val.litellm_provider || '';
        const normalizedProv = normalizeProvider(litellmProvider) || litellmProvider;
        const baseKey = normalizedProv + '/' + baseModel;
        if (!resolutionVariants.has(baseKey)) resolutionVariants.set(baseKey, []);
        resolutionVariants.get(baseKey).push({ quality, size, costPerImage: cost });
      }
      continue;
    }

    let hasAnyPricing = false;
    const rate = {};

    if (val.input_cost_per_token !== undefined) { rate.inputCostPerToken = val.input_cost_per_token; hasAnyPricing = true; }
    if (val.output_cost_per_token !== undefined) { rate.outputCostPerToken = val.output_cost_per_token; hasAnyPricing = true; }
    if (val.cache_creation_input_token_cost !== undefined) rate.cacheWriteCostPerToken = val.cache_creation_input_token_cost;
    if (val.cache_read_input_token_cost !== undefined) rate.cacheReadCostPerToken = val.cache_read_input_token_cost;
    if (val.output_cost_per_image !== undefined) { rate.outputCostPerImage = val.output_cost_per_image; hasAnyPricing = true; }
    if (val.input_cost_per_image !== undefined) { rate.inputCostPerImage = val.input_cost_per_image; hasAnyPricing = true; }
    if (val.input_cost_per_image_token !== undefined) { rate.inputCostPerImageToken = val.input_cost_per_image_token; hasAnyPricing = true; }
    if (val.output_cost_per_image_token !== undefined) { rate.outputCostPerImageToken = val.output_cost_per_image_token; hasAnyPricing = true; }
    if (val.output_cost_per_video_per_second !== undefined) {
      rate.outputCostPerVideoPerSecond = val.output_cost_per_video_per_second; hasAnyPricing = true;
    } else if (val.output_cost_per_second !== undefined && val.mode === 'video_generation') {
      rate.outputCostPerVideoPerSecond = val.output_cost_per_second; hasAnyPricing = true;
    }

    // Tiered pricing
    const tiers = [];
    for (const tierKey of Object.keys(val)) {
      const tierMatch = tierKey.match(/^(input|output)_cost_per_token_above_(\d+k)_tokens$/);
      if (tierMatch) {
        const [, direction, threshold] = tierMatch;
        let existing = tiers.find((t) => t.threshold === threshold);
        if (!existing) { existing = { threshold }; tiers.push(existing); }
        if (direction === 'input') existing.input = val[tierKey];
        else existing.output = val[tierKey];
      }
    }
    if (tiers.length > 0) rate.tieredPricing = tiers;

    if (!hasAnyPricing) continue;

    const litellmProvider = val.litellm_provider || '';
    const parts = key.split('/');
    const modelName = parts.length > 1 ? parts.slice(1).join('/') : key;

    map.set(litellmProvider + '/' + modelName, rate);

    const normalizedProv = normalizeProvider(litellmProvider);
    if (normalizedProv && normalizedProv !== litellmProvider) {
      const normalizedKey = normalizedProv + '/' + modelName;
      if (!map.has(normalizedKey)) map.set(normalizedKey, rate);
    }

    if (litellmProvider === 'openrouter' && key.startsWith('openrouter/')) {
      map.set(key, rate);
    }
  }

  // Merge resolution variants
  for (const [baseKey, variants] of resolutionVariants) {
    const existing = map.get(baseKey);
    if (existing) existing.resolutionTiers = variants;
    for (const [k, v] of map) {
      if (k.endsWith('/' + baseKey.split('/').pop()) && !v.resolutionTiers) {
        v.resolutionTiers = variants;
      }
    }
  }

  return map;
}

// ─── OpenRouter ──────────────────────────────────────────────────────────────

const OPENROUTER_API_URL = 'https://openrouter.ai/api/v1/models';

/**
 * Fetch OpenRouter pricing data.
 * @returns {Promise<Map<string, object>>}
 */
async function fetchOpenRouterBrowser() {
  const map = new Map();
  const resp = await fetch(OPENROUTER_API_URL);
  if (!resp.ok) throw new Error('OpenRouter: HTTP ' + resp.status);
  const json = await resp.json();
  const models = json.data || [];

  for (const model of models) {
    if (!model.pricing?.prompt || !model.pricing?.completion) continue;
    const slashIdx = model.id.indexOf('/');
    if (slashIdx === -1) continue;
    const prefix = model.id.substring(0, slashIdx);
    const modelName = model.id.substring(slashIdx + 1);
    const provider = normalizeProvider(prefix) || prefix;
    const input = parseFloat(model.pricing.prompt);
    const output = parseFloat(model.pricing.completion);
    if (!isNaN(input) && !isNaN(output)) {
      const rate = { inputCostPerToken: input, outputCostPerToken: output };

}

/**
 * Load official pricing from a URL or embedded data.
 * @param {string|object} source - URL string or already-parsed data object
 * @returns {Promise<{entries: Array, timestamp: number}|null>}
 */
async function loadOfficialPricingBrowser(source) {
  if (!source) return null;
  if (typeof source === 'object') return source;
  try {
    const resp = await fetch(source);
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

  document.getElementById('quick-prov').addEventListener('click',function(){

    if(t){e.stopPropagation();var p=document.getElementById(t.dataset.popover);if(!p)return;if(op&&op!==p)op.classList.remove('open');p.classList.toggle('open');if(p.classList.contains('open')){positionPop(sa||t,p);op=p}else{op=null}return}
    if(e.target.closest('.pop'))return;if(op){op.classList.remove('open');op=null}
  });
  window.addEventListener('scroll',function(){if(op){op.classList.remove('open');op=null}},true);

  // Read filter

  var readClear=document.getElementById('read-clear');

  // Token persistence
  (function(){var urlEl=document.getElementById('sync-url');var tokEl=document.getElementById('sync-token');try{var domain=new URL(urlEl.value).hostname;var saved=localStorage.getItem('aigne-sync-token:'+domain);if(saved)tokEl.value=saved}catch(e){}tokEl.addEventListener('input',function(){try{var domain=new URL(urlEl.value).hostname;if(tokEl.value)localStorage.setItem('aigne-sync-token:'+domain,tokEl.value);else localStorage.removeItem('aigne-sync-token:'+domain)}catch(e){}})})();

  updSecChkAll();
  updSelCnt();
  updUmCnt();
}

function positionPop(trigger,pop){var r=trigger.getBoundingClientRect();var pw=Math.min(520,window.innerWidth-32);var left=r.right-pw;if(left<16)left=16;var arrowRight=r.right-left-r.width/2-5;var arr=pop.querySelector('.parr');if(arr){arr.style.right=Math.max(8,Math.min(arrowRight,pw-16))+'px'}var spaceBelow=window.innerHeight-r.bottom;if(spaceBelow<300&&r.top>300){pop.style.bottom=(window.innerHeight-r.top+6)+'px';pop.style.top='';if(arr){arr.style.top='';arr.style.bottom='-6px';arr.style.transform='rotate(225deg)'}}else{pop.style.top=(r.bottom+6)+'px';pop.style.bottom='';if(arr){arr.style.top='-6px';arr.style.bottom='';arr.style.transform='rotate(45deg)'}}pop.style.left=left+'px'}

function applyRead(key,checked){if(checked)readSet.add(key);else readSet.delete(key);localStorage.setItem(LS_KEY,JSON.stringify([...readSet]));document.querySelectorAll('.r1').forEach(function(r1){if(r1.dataset.key!==key)return;r1.classList.toggle('read-done',checked);var r2=r1.nextElementSibling;if(r2&&r2.classList.contains('r2'))r2.classList.toggle('read-done',checked)});go();updSecChkAll();updSelCnt()}

function getUmSelected(){var keys=new Set();document.querySelectorAll('.um-chk:checked').forEach(function(cb){keys.add(cb.dataset.umk)});return keys}
function updUmCnt(){var cnt=getUmSelected().size;var el=document.getElementById('um-sel-cnt');if(el)el.textContent=cnt;var syncEl=document.getElementById('sync-um-cnt');if(syncEl)syncEl.textContent=cnt;var allChk=document.getElementById('um-chk-all');if(allChk){var visibleChks=document.querySelectorAll('.um-row:not(.hidden) .um-chk');var visChecked=0;visibleChks.forEach(function(cb){if(cb.checked)visChecked++});allChk.checked=visibleChks.length>0&&visChecked===visibleChks.length;allChk.indeterminate=visChecked>0&&visChecked<visibleChks.length}}
function applyUmCheck(key,checked){if(checked)umSelSet.add(key);else umSelSet.delete(key);localStorage.setItem(UM_LS,JSON.stringify([...umSelSet]));document.querySelectorAll('.um-row[data-umk="'+key+'"]').forEach(function(r){r.classList.toggle('um-checked',checked)});updUmCnt()}
function toggleUmAll(on){document.querySelectorAll('.um-row:not(.hidden) .um-chk').forEach(function(cb){cb.checked=on;applyUmCheck(cb.dataset.umk,on)});var qb=document.querySelector('.um-btn-quick');if(qb)qb.classList.remove('active');updUmCnt()}
var UM_QUICK_PROVS=['anthropic','openai','google','xai'];
function toggleUmQuick(){var btn=document.querySelector('.um-btn-quick');var isActive=btn&&btn.classList.contains('active');toggleUmAll(false);if(!isActive){document.querySelectorAll('.um-row:not(.hidden)').forEach(function(r){if(UM_QUICK_PROVS.indexOf(r.dataset.provider)>=0){var cb=r.querySelector('.um-chk');if(cb){cb.checked=true;applyUmCheck(cb.dataset.umk,true)}}});if(btn)btn.classList.add('active')}updUmCnt()}

function getSyncSelected(){var keys=new Set();document.querySelectorAll('.rchk-in:checked').forEach(function(cb){keys.add(cb.dataset.rk)});return keys}
function updSelCnt(){var el=document.getElementById('sync-sel-cnt');if(el)el.textContent=getSyncSelected().size}
function toggleSyncAll(on){document.querySelectorAll('.mrow:not(.hidden) .rchk-in').forEach(function(cb){cb.checked=on;applyRead(cb.dataset.rk,on)});updSecChkAll();updSelCnt()}
function toggleSecSync(secName,on){var sec=document.querySelector('[data-sec="'+secName+'"]');if(!sec)return;sec.querySelectorAll('.mrow:not(.hidden) .rchk-in').forEach(function(cb){cb.checked=on;applyRead(cb.dataset.rk,on)});updSecChkAll();updSelCnt()}
function updSecChkAll(){document.querySelectorAll('.sec-chk-all').forEach(function(chk){var sec=chk.closest('[data-sec]');if(!sec)return;var all=sec.querySelectorAll('.mrow:not(.hidden) .rchk-in');var checked=0;all.forEach(function(cb){if(cb.checked)checked++});var isAll=all.length>0&&checked===all.length;chk.checked=isAll;chk.indeterminate=checked>0&&checked<all.length;var lbl=sec.querySelector('.sec-sel-label');if(lbl)lbl.textContent=isAll?'取消全选':'全选'})}

function go(){
  var si=document.getElementById('si');var q=si?si.value.toLowerCase().trim():'';
  var counts={'below-cost':0,drift:0,'no-match':0,normal:0,total:0,unmatched:0};
  document.querySelectorAll('.r1').forEach(function(r1){
    var s=r1.dataset.search.toLowerCase();var st=r1.dataset.status;var k=r1.dataset.key;var prov=s.split('/')[0];var isRead=readSet.has(k);
    var vis=(!q||s.includes(q))&&(cf==='all'||st===cf)&&(cpSet.size===0||cpSet.has(prov))&&(!hideRead||!isRead);
    r1.classList.toggle('hidden',!vis);var r2=r1.nextElementSibling;if(r2&&r2.classList.contains('r2'))r2.classList.toggle('hidden',!vis);
    if(vis){counts[st]=(counts[st]||0)+1;counts.total++}
  });
  document.querySelectorAll('.um-row').forEach(function(row){
    var s=row.dataset.search.toLowerCase();var prov=row.dataset.provider;var k=row.dataset.umk;var isChecked=umSelSet.has(k);
    var vis=(!q||s.includes(q))&&(cf==='all'||cf==='unmatched')&&(cpSet.size===0||cpSet.has(prov))&&(!hideRead||!isChecked);
    row.classList.toggle('hidden',!vis);if(vis)counts.unmatched++;
  });
  document.querySelectorAll('.prow').forEach(function(p){var n=p.nextElementSibling,v=false;while(n&&!n.classList.contains('prow')){if((n.classList.contains('r1')||n.classList.contains('um-row'))&&!n.classList.contains('hidden')){v=true;break}n=n.nextElementSibling}p.classList.toggle('hidden',!v)});
  var el=function(id){return document.getElementById(id)};
  el('sum-belowcost').textContent=counts['below-cost'];el('sum-drift').textContent=counts.drift;el('sum-nomatch').textContent=counts['no-match'];el('sum-ok').textContent=counts.normal;el('sum-unmatched').textContent=counts.unmatched;el('sum-total').textContent=counts.total;
  document.querySelectorAll('.sec').forEach(function(sec){var secType=sec.dataset.sec;var cnt=sec.querySelector('.sec-cnt');if(cnt&&secType)cnt.textContent=counts[secType]||0});
  updUmCnt();
}

// ─── Sync Panel ──────────────────────────────────────────────────────────────
function fmtPrice_sync(v,pu){if(v==null)return'-';var n=Number(v);if(isNaN(n))return'-';if(n===0)return'$0';if(pu==='per-image')return'$'+n.toFixed(4)+'/张';if(pu==='per-second')return'$'+n.toFixed(4)+'/sec';var mtok=n*1e6;if(mtok<0.0001)return'$'+mtok.toFixed(7);if(mtok<0.01)return'$'+mtok.toFixed(5);if(mtok<1)return'$'+mtok.toFixed(3);return'$'+mtok.toFixed(2)}
function showStatus(msg,bg,fg){var el=document.getElementById('sync-status');el.style.display='block';el.style.background=bg;el.style.color=fg;el.textContent=msg}

async function doSync(isDryRun){
  var url=document.getElementById('sync-url').value.trim().replace(/\/$/,'');
  var token=document.getElementById('sync-token').value.trim();
  var deprecate=document.getElementById('sync-deprecate').checked;
  var applyRates=document.getElementById('sync-apply-rates').checked;
  var profitMargin=parseFloat(document.getElementById('sync-margin').value);
  var creditPrice=parseFloat(document.getElementById('sync-credit-price').value);
  var result=document.getElementById('sync-result');var execBtn=document.getElementById('sync-execute-btn');
  if(!url){showStatus('请输入 API 地址','#feebc8','#c05621');return}
  if(!token){showStatus('请输入 Access Token','#feebc8','#c05621');return}
  var checkedKeys=getSyncSelected();
  var selectedEntries=__allEntries.filter(function(e){return checkedKeys.has(e.provider+'/'+e.modelId)}).map(function(e){
    var inp=e.inputCostPerToken,out=e.outputCostPerToken;
    if(e.tieredPricing&&e.tieredPricing.length){var hi=e.tieredPricing[e.tieredPricing.length-1];if(hi.input&&hi.input>inp)inp=hi.input;if(hi.output&&hi.output>out)out=hi.output}
    if(e.resolutionTiers&&e.resolutionTiers.length){var maxCPI=0;e.resolutionTiers.forEach(function(t){if(t.costPerImage>maxCPI)maxCPI=t.costPerImage});if(maxCPI&&maxCPI>out)out=maxCPI}
    return Object.assign({},e,{inputCostPerToken:inp,outputCostPerToken:out});
  });
  var umKeys=getUmSelected();var selectedUm=__umEntries.filter(function(e){return umKeys.has(e.provider+'/'+e.modelId)});
  var allSelected=[...selectedEntries,...selectedUm];
  if(!allSelected.length){showStatus('请先勾选要同步的模型','#feebc8','#c05621');return}
  var isPartial=selectedEntries.length<__allEntries.length;var safeDeprecate=deprecate&&!isPartial;
  var cntMsg=selectedEntries.length+(selectedUm.length?' + '+selectedUm.length+' 新增':'');
  showStatus(isDryRun?'正在预览 '+cntMsg+' 个模型...':'正在执行同步...','#ebf8ff','#2b6cb0');
  execBtn.style.display='none';
  try{
    var body={mode:'sync',entries:allSelected,dryRun:isDryRun,deprecateUnmatched:safeDeprecate,applyRates:applyRates,profitMargin:applyRates?profitMargin:undefined,creditPrice:applyRates?creditPrice:undefined};
    var resp=await fetch(url+'/api/ai-providers/bulk-rate-update',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
    var json=await resp.json();if(!resp.ok)throw new Error(json.error||resp.statusText);
    var s=json.summary||{};var dep=json.deprecated||[];
    var bg=isDryRun?'#ebf8ff':'#c6f6d5';var fg=isDryRun?'#2b6cb0':'#276749';
    var prefix=isDryRun?'[预览] ':'[已执行] ';
    showStatus(prefix+'更新 '+s.updated+(s.created?' / 新增 '+s.created:'')+' / 无变化 '+s.unchanged+' / 未匹配 '+s.unmatched+(dep.length?' / 软删除 '+dep.length:''),bg,fg);
    var h='';
    if(json.updated&&json.updated.length){
      function diffCell(oldV,newV,pu){
        var o=oldV!=null?Number(oldV):NaN,n=newV!=null?Number(newV):NaN;
        if(isNaN(n)||n===0)return'<td style="padding:4px 10px;text-align:right;color:#cbd5e0">—</td>';
        if(isNaN(o)||o===0)return'<td style="padding:4px 10px;text-align:right"><span style="color:#38a169;font-weight:600">'+fmtPrice_sync(n,pu)+'</span> <span style="color:#a0aec0;font-size:10px">新增</span></td>';
        if(Math.abs(o-n)/Math.max(o,n)<0.001)return'<td style="padding:4px 10px;text-align:right;color:#a0aec0">'+fmtPrice_sync(n,pu)+'</td>';
        return'<td style="padding:4px 10px;text-align:right"><span style="color:#a0aec0;text-decoration:line-through">'+fmtPrice_sync(o,pu)+'</span> <span style="color:#2d3748;margin:0 2px">&rarr;</span> <span style="font-weight:600">'+fmtPrice_sync(n,pu)+'</span></td>';
      }
      h+='<div style="margin-bottom:12px"><strong style="color:#276749">待更新 ('+json.updated.length+')</strong><table style="width:100%;font-size:12px;border-collapse:collapse;margin-top:6px"><tr style="background:#f7fafc"><th style="padding:6px 10px;text-align:left">Model</th><th style="padding:6px 10px;text-align:right">Input Cost</th><th style="padding:6px 10px;text-align:right">Output Cost</th><th style="padding:6px 10px;text-align:right">Cache Write</th><th style="padding:6px 10px;text-align:right">Cache Read</th></tr>';
      json.updated.forEach(function(u){
        var oc=u.oldUnitCosts||{},nc=u.newUnitCosts||{};
        h+='<tr style="border-bottom:1px solid #edf2f7"><td style="padding:4px 10px"><span style="color:#a0aec0;font-size:11px">'+u.provider+'/</span>'+u.model+'</td>';
        h+=diffCell(oc.input,nc.input,'per-token');
        h+=diffCell(oc.output,nc.output,'per-token');
        h+=diffCell(oc.cacheWrite,nc.cacheWrite,'per-token');
        h+=diffCell(oc.cacheRead,nc.cacheRead,'per-token');
        h+='</tr>';
      });
      h+='</table></div>';
    }
    if(json.created&&json.created.length){h+='<div style="margin-bottom:12px"><strong style="color:#2b6cb0">待新增 ('+json.created.length+')</strong><table style="width:100%;font-size:12px;border-collapse:collapse;margin-top:6px"><tr style="background:#ebf8ff"><th style="padding:6px 10px;text-align:left">Model</th><th style="padding:6px 10px;text-align:left">Type</th><th style="padding:6px 10px;text-align:right">Input Cost</th><th style="padding:6px 10px;text-align:right">Output Cost</th><th style="padding:6px 10px;text-align:right">Cache Write</th><th style="padding:6px 10px;text-align:right">Cache Read</th></tr>';json.created.forEach(function(c){var uc=c.unitCosts||{};h+='<tr style="border-bottom:1px solid #bee3f8"><td style="padding:4px 10px"><span style="color:#a0aec0;font-size:11px">'+c.provider+'/</span>'+c.model+'</td><td style="padding:4px 10px">'+c.type+'</td><td style="padding:4px 10px;text-align:right;font-weight:600">'+fmtPrice_sync(uc.input,'per-token')+'</td><td style="padding:4px 10px;text-align:right;font-weight:600">'+fmtPrice_sync(uc.output,'per-token')+'</td><td style="padding:4px 10px;text-align:right">'+(uc.cacheWrite?fmtPrice_sync(uc.cacheWrite,'per-token'):'<span style="color:#cbd5e0">—</span>')+'</td><td style="padding:4px 10px;text-align:right">'+(uc.cacheRead?fmtPrice_sync(uc.cacheRead,'per-token'):'<span style="color:#cbd5e0">—</span>')+'</td></tr>'});h+='</table></div>'}
    if(dep.length){h+='<div style="margin-bottom:12px"><strong style="color:#9b2c2c">待软删除 ('+dep.length+')</strong><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">';dep.forEach(function(d){h+='<span style="padding:3px 10px;background:#fed7d7;color:#9b2c2c;border-radius:4px;font-size:12px">'+d.provider+'/'+d.model+'</span>'});h+='</div></div>'}
    result.style.display=h?'block':'none';result.innerHTML=h;
    if(isDryRun&&(s.updated>0||dep.length>0||(s.created&&s.created>0)))execBtn.style.display='inline-block';
    setTimeout(async function(){var rateMap=await fetchLiveDbRates();if(rateMap){refreshSellDisplay(rateMap);recategorizeRows(rateMap)}},isDryRun?200:1500);
  }catch(e){showStatus('错误: '+e.message,'#fed7d7','#9b2c2c');result.style.display='none'}
}

// ─── Live DB Refresh ─────────────────────────────────────────────────────────
async function fetchLiveDbRates(){
  var hubUrl=(document.getElementById('sync-url')?.value||'').trim().replace(/\/$/, '');
  if(!hubUrl)return null;
  var token=(document.getElementById('sync-token')?.value||'').trim();
  var headers={};if(token)headers['Authorization']='Bearer '+token;
  try{
    var all=[];var page=1;
    while(true){var resp=await fetch(hubUrl+'/api/ai-providers/model-rates?pageSize=100&page='+page,{headers:headers});if(!resp.ok)throw new Error('HTTP '+resp.status);var data=await resp.json();var list=data.list||[];all.push(...list);if(list.length<100)break;page++}
    var map=new Map();for(var r of all){var pName=r.provider?.name||'';var key=pName+'/'+r.model;map.set(key,{inputRate:Number(r.inputRate)||0,outputRate:Number(r.outputRate)||0,unitCosts:{input:Number(r.unitCosts?.input)||0,output:Number(r.unitCosts?.output)||0},cacheWriteRate:Number(r.caching?.writeRate)||0,cacheReadRate:Number(r.caching?.readRate)||0,type:r.type||''})}
    return map;
  }catch(e){console.error('fetchLiveDbRates failed:',e);return null}
}
function updateMarginBadge(el,sell,cost){if(!cost||cost===0){el.textContent='';el.className='mg';return}var pct=(sell-cost)/cost*100;var abs=Math.abs(pct);if(abs<0.05){el.textContent='';el.className='mg';return}el.textContent=(pct>=0?'+':'')+pct.toFixed(1)+'%';el.className='mg '+(pct<-2?'loss':abs<=2?'even':'drift')}
function updateSellRow(row,rate,entry){
  var pu=entry?.modelType==='imageGeneration'?'per-image':entry?.modelType==='video'?'per-second':'per-token';
  var sellIn=rate.inputRate,sellOut=rate.outputRate;
  var siEl=row.querySelector('[data-field="sell-in"]');if(siEl)siEl.textContent=pu==='per-image'||pu==='per-second'?'—':fmtPrice_sync(sellIn,pu);
  var soEl=row.querySelector('[data-field="sell-out"]');if(soEl)soEl.textContent=fmtPrice_sync(sellOut,pu);
  if(entry){var mc=getMarginCosts(entry);var mgIn=row.querySelector('[data-mg="input"]');if(mgIn)updateMarginBadge(mgIn,sellIn,mc.input);var mgOut=row.querySelector('[data-mg="output"]');if(mgOut)updateMarginBadge(mgOut,sellOut,mc.output)}
  var cwEl=row.querySelector('[data-field="sell-cw"]');if(cwEl&&rate.cacheWriteRate)cwEl.textContent=fmtPrice_sync(rate.cacheWriteRate,'per-token');
  var crEl=row.querySelector('[data-field="sell-cr"]');if(crEl&&rate.cacheReadRate)crEl.textContent=fmtPrice_sync(rate.cacheReadRate,'per-token');
}
function refreshSellDisplay(rateMap){
  var updated=0;
  document.querySelectorAll('tr.r2[data-key]').forEach(function(r2){var rate=rateMap.get(r2.dataset.key);if(!rate)return;updateSellRow(r2,rate,__entryMap.get(r2.dataset.key));updated++});
  document.querySelectorAll('tr.r1[data-key]').forEach(function(r1){var rate=rateMap.get(r1.dataset.key);if(!rate)return;var entry=__entryMap.get(r1.dataset.key);r1.querySelectorAll('.stbl-sell').forEach(function(sellRow){updateSellRow(sellRow,rate,entry)});updateSellRow(r1,rate,entry)});
  return updated;
}
function recategorizeRows(rateMap){
  var secCfg={'below-cost':{cls:'sec-belowcost',title:'高风险成本亏损',cnt:'critical',sub:'售价低于成本，存在亏损风险'},'drift':{cls:'sec-drift',title:'漂移量过大',cnt:'danger',sub:'DB 售价与外部数据源偏差超过阈值'},'no-match':{cls:'sec-nomatch',title:'未找到对应的官方输入输出',cnt:'miss',sub:'未匹配到官方或外部数据源，需人工确认'},'normal':{cls:'sec-ok',title:'定价正常',cnt:'ok',sub:'定价在合理范围内'}};
  var moved=0,affected=new Set();
  var theadH='';var et=document.querySelector('.sec table.mt thead');if(et)theadH=et.outerHTML;
  document.querySelectorAll('tr.r1[data-key]').forEach(function(r1){
    var k=r1.dataset.key;var entry=__entryMap.get(k),rate=rateMap.get(k);if(!entry||!rate)return;
    var ns=classifyFromEntryAndRate(entry,rate,r1.dataset.noofficial==='1');
    if(!ns||ns===r1.dataset.status)return;
    var oldSec=r1.closest('[data-sec]');if(oldSec)affected.add(oldSec.dataset.sec);affected.add(ns);
    r1.dataset.status=ns;var r2=r1.nextElementSibling;var has2=r2&&r2.classList.contains('r2');
    var ts=document.querySelector('[data-sec="'+ns+'"]');
    if(!ts){var c=secCfg[ns];if(!c)return;var d=document.createElement('div');d.className='sec '+c.cls;d.dataset.sec=ns;d.innerHTML='<div class="sec-h"><h2>'+c.title+'</h2><span class="cnt '+c.cnt+' sec-cnt">0</span><span class="sec-sub">'+c.sub+'</span><span class="chevron">▼</span></div><div class="sec-body"><table class="mt">'+theadH+'<tbody></tbody></table></div>';var order=['below-cost','drift','no-match','normal','unmatched'];var ti=order.indexOf(ns),ins=false;for(var i=ti+1;i<order.length;i++){var nx=document.querySelector('[data-sec="'+order[i]+'"]');if(nx){nx.parentNode.insertBefore(d,nx);ins=true;break}}if(!ins){var sp=document.getElementById('sync-panel');if(sp)sp.parentNode.insertBefore(d,sp)}ts=d;d.querySelector('.sec-h').addEventListener('click',function(){d.classList.toggle('collapsed')})}
    var ttb=ts.querySelector('.sec-body tbody');var emp=ttb.querySelector('.empty');if(emp)emp.closest('tr').remove();
    ttb.appendChild(r1);if(has2)ttb.appendChild(r2);moved++;
  });
  if(moved>0){affected.forEach(function(sn){var s=document.querySelector('[data-sec="'+sn+'"]');if(!s)return;rebuildSec(s);var hasM=s.querySelector('.sec-body tbody .r1');if(!hasM&&sn!=='normal')s.style.display='none';else s.style.display=''});go()}
  return moved;
}
function rebuildSec(secEl){var tb=secEl.querySelector('.sec-body tbody');if(!tb)return;var pairs=[];Array.from(tb.querySelectorAll('.r1')).forEach(function(r1){var r2=r1.nextElementSibling;pairs.push({r1:r1,r2:r2&&r2.classList.contains('r2')?r2:null,prov:r1.dataset.provider||r1.dataset.key.split('/')[0]})});while(tb.firstChild)tb.removeChild(tb.firstChild);if(!pairs.length){tb.innerHTML='<tr><td colspan="'+COLS+'" class="empty">无</td></tr>';return}var g={};pairs.forEach(function(p){(g[p.prov]=g[p.prov]||[]).push(p)});Object.keys(g).sort().forEach(function(pv){var pr=document.createElement('tr');pr.className='prow';pr.dataset.provider=pv;pr.innerHTML='<td colspan="'+COLS+'"><strong>'+provName(pv)+'</strong><span class="pcnt">'+g[pv].length+'</span></td>';tb.appendChild(pr);g[pv].forEach(function(p){tb.appendChild(p.r1);if(p.r2)tb.appendChild(p.r2)})})}
function showDbStatus(msg,bg,fg){var el=document.getElementById('db-status');el.style.display='block';el.style.background=bg;el.style.color=fg;el.textContent=msg}
async function doRefreshDb(){
  showDbStatus('正在从 Hub API 获取最新售价数据...','#ebf8ff','#2b6cb0');
  var rateMap=await fetchLiveDbRates();
  if(rateMap){var cnt=refreshSellDisplay(rateMap);var moved=recategorizeRows(rateMap);var parts=[rateMap.size+' 条记录，'+cnt+' 行已更新'];if(moved)parts.push(moved+' 项重新分类');showDbStatus('DB 售价已刷新 — '+parts.join(' / ')+' ('+new Date().toLocaleTimeString('zh-CN')+')','#c6f6d5','#276749')}
  else{var hubUrl_=(document.getElementById('sync-url')?.value||'').trim();var token_=(document.getElementById('sync-token')?.value||'').trim();var hint=hubUrl_?'':'API 地址为空';if(hubUrl_&&!token_)hint='可能需要 Access Token';if(hubUrl_&&token_)hint='请检查 API 地址或 Token';showDbStatus('获取 DB 数据失败'+(hint?' — '+hint:''),'#fed7d7','#9b2c2c')}
}

// ─── Main Entry ──────────────────────────────────────────────────────────────
(async function(){
  try{
    // 1. Fetch DB rates
    setStep('db','active');
    var dbRates;
    try{dbRates=await fetchDbRatesBrowser(__hubUrl);setStep('db','done',dbRates.length+' 条')}
    catch(e){setStep('db','error');document.getElementById('loading-error').style.display='block';document.getElementById('loading-error').textContent='无法加载 DB 数据: '+e.message;return}

    // 2. Fetch LiteLLM
    setStep('ll','active');
    var litellm=new Map();
    try{litellm=await fetchLiteLLMBrowser();setStep('ll','done',litellm.size+' 条')}
    catch(e){setStep('ll','error');__warnings.push('LiteLLM 数据加载失败: '+e.message)}

    // 3. Fetch OpenRouter
    setStep('or','active');
    var openrouter=new Map();
    try{openrouter=await fetchOpenRouterBrowser();setStep('or','done',openrouter.size+' 条')}
    catch(e){setStep('or','error');__warnings.push('OpenRouter 数据加载失败 (可能 CORS): '+e.message)}

    // 4. Official pricing
    setStep('op','active');
    var officialMap=new Map();
    if(__officialPricingFallback&&__officialPricingFallback.entries){
      officialMap=buildOfficialPricingMap(__officialPricingFallback.entries);
      setStep('op','done',officialMap.size+' 条 (嵌入)');
    }else{setStep('op','done','无数据')}

    // 5. Compare
    setStep('calc','active');
    var results=compare(dbRates,litellm,openrouter,officialMap,0.1);
    var groups=classifyAndGroup(results);
    var unmatchedModels=officialMap.size>0?findUnmatchedOfficialModels(dbRates,officialMap,litellm):[];
    setStep('calc','done',results.length+' 个模型');

    // 6. Render
    setStep('render','active');
    renderReport(results,groups,unmatchedModels);
    setStep('render','done');

    // Show app
    document.getElementById('loading-area').style.display='none';
    document.getElementById('app-content').style.display='';

    // Auto-refresh DB after a short delay
    setTimeout(function(){doRefreshDb()},800);

  }catch(e){
    document.getElementById('loading-error').style.display='block';
    document.getElementById('loading-error').textContent='致命错误: '+e.message;
    console.error(e);
  }
})();
</script>
