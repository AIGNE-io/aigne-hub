<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGNE Hub 定价报告 - 2026/3/20</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;background:#f5f6f8;padding:24px;color:#1a1a2e;font-size:15px;min-height:100vh;line-height:1.5}
.wrap{max-width:1480px;margin:0 auto}

.hdr{background:linear-gradient(135deg,#2d3748,#4a5568);color:#fff;padding:28px 36px;border-radius:14px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hdr h1{font-size:1.65rem;font-weight:700;margin-bottom:6px}
.hdr .meta{font-size:.9rem;opacity:.78}

.summary{display:grid;grid-template-columns:repeat(7,1fr);gap:14px;margin-bottom:20px}
.st{background:#fff;padding:20px;border-radius:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0}
.st .n{font-size:1.85rem;font-weight:700;margin-bottom:2px}
.st .l{color:#718096;font-size:.88rem}
.st.critical .n{color:#9b2c2c}.st.danger .n{color:#e53e3e}.st.ok .n{color:#38a169}
.st[data-f]{cursor:pointer;transition:all .15s}
.st[data-f]:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.st[data-f].active{border-color:#2d3748;box-shadow:0 0 0 2px #2d3748}

.tb{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.sinput{flex:1;min-width:200px;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;outline:none}
.sinput:focus{border-color:#4a5568}
.fb{padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;transition:all .12s}
.fb:hover{background:#f7fafc}
.fb.active{background:#2d3748;color:#fff;border-color:#2d3748}
.tb-sep{width:1px;height:24px;background:#e2e8f0;margin:0 4px;flex-shrink:0}
.quick-prov{border-color:#667eea;color:#667eea;font-size:12px;padding:6px 12px}
.quick-prov.active{background:#667eea;color:#fff;border-color:#667eea}
.pb{padding:6px 12px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;transition:all .12s;color:#4a5568}
.pb:hover{background:#edf2f7;border-color:#a0aec0}
.pb.active{background:#4c51bf;color:#fff;border-color:#4c51bf}

.sec{border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0;margin-bottom:20px;overflow-x:auto}
.sec-h{padding:16px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .12s;flex-wrap:wrap}
.sec-h:hover{filter:brightness(.97)}
.sec-h h2{font-size:1.1rem;font-weight:600}
.sec-h .sec-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sec-h .chevron{font-size:12px;color:#a0aec0;transition:transform .2s}
.sec.collapsed .sec-h .chevron{transform:rotate(-90deg)}
.sec.collapsed .sec-body{display:none}
.cnt{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.8rem;font-weight:600}
.cnt.critical{background:#fed7d7;color:#9b2c2c}.cnt.danger{background:#feebc8;color:#c05621}.cnt.ok{background:#c6f6d5;color:#276749}

.sec-belowcost{background:#fff0f0;border-color:#fc8181}
.sec-belowcost .sec-h{border-color:#fc8181}
.sec-drift{background:#fff5f5;border-color:#feb2b2}
.sec-drift .sec-h{border-color:#feb2b2}
.sec-nomatch{background:#fffff0;border-color:#fefcbf}
.sec-nomatch .sec-h{border-color:#fefcbf}
.sec-deprecated{background:#f7f7f8;border-color:#d1d5db}
.sec-deprecated .sec-h{border-color:#d1d5db}
.cnt.deprecated{background:#e5e7eb;color:#6b7280}
.sec-ok{background:#f0fff4;border-color:#c6f6d5}
.sec-ok .sec-h{border-color:#c6f6d5}

.sec table.mt thead{background:rgba(255,255,255,.7)}
.sec .prow td{background:rgba(247,250,252,.7)}
.sec .mrow:hover td,.sec .mrow.r1:hover+.mrow.r2 td{background:rgba(255,255,255,.5)}

table.mt{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}
table.mt thead{background:#f7fafc;border-bottom:1px solid #e2e8f0}
table.mt th{padding:11px 14px;text-align:left;font-weight:600;color:#4a5568;font-size:.8rem;text-transform:uppercase;letter-spacing:.3px}

.prow td{padding:9px 14px;background:#f7fafc;border-bottom:1px solid #e2e8f0;font-size:13px;color:#4a5568}
.pcnt{margin-left:6px;font-size:12px;color:#a0aec0;font-weight:400}

.mrow td{padding:4px 14px;vertical-align:middle}
.r1 td{border-top:1px solid #edf2f7;padding-top:10px;padding-bottom:2px}
.r1 .mcol{padding-top:10px;padding-bottom:10px}
.r2 td{border-bottom:1px solid #edf2f7;padding-top:2px;padding-bottom:10px}
.mrow.r1:hover td,.mrow.r1:hover+.mrow.r2 td{background:#f7fafc}
.mrow.r2:hover td{background:#f7fafc}
.mrow.hidden,.prow.hidden{display:none}

.ck-col{text-align:center;vertical-align:middle !important}
.rchk{display:inline-flex;align-items:center;cursor:pointer;vertical-align:middle;flex-shrink:0}
.del-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;opacity:0.4;transition:all 0.15s;vertical-align:middle;border-radius:4px}
.del-btn:hover{opacity:1}
.del-btn.del-active{opacity:1;background:#fed7d7}
.mrow.del-marked td{background:rgba(229,62,62,.06) !important;text-decoration:line-through;color:#a0aec0}
.mrow.del-marked .mcol,.mrow.del-marked .scol,.mrow.del-marked .ck-col{text-decoration:none;color:inherit}
.mrow.del-marked .mono{color:#a0aec0}
.rchk input[type="checkbox"]{position:absolute;opacity:0;pointer-events:none}
.rchk-box{width:18px;height:18px;border:2px solid #cbd5e0;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.rchk-box::after{content:'';display:none;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
.rchk input[type="checkbox"]:checked+.rchk-box{background:#38a169;border-color:#38a169}
.rchk input[type="checkbox"]:checked+.rchk-box::after{display:block}
.rchk:hover .rchk-box{border-color:#a0aec0}
.mrow.read-done td{background:rgba(56,161,105,.06)}
.mrow.read-done:hover td{background:rgba(56,161,105,.10)}
.mrow.read-done .ck-col{opacity:1}

.mcol{word-break:break-all;vertical-align:top !important;padding-top:14px !important}
.ti{font-size:15px;margin-right:3px}
.mname{font-size:13px;color:#4a5568}
.mname strong{color:#1a202c}
.utag{font-size:10px;padding:2px 5px;background:#ebf8ff;color:#2b6cb0;border-radius:3px;margin-left:3px}

.lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;width:44px}
.lbl-cost{color:#718096}
.lbl-sell{color:#2d3748}
.stbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid #cbd5e0;border-radius:5px;font-size:13px;overflow:hidden;cursor:pointer}
.stbl:hover{border-color:#a0aec0}
.stbl td{padding:3px 10px;border-bottom:1px solid #e2e8f0}
.stbl tr:last-child td{border-bottom:none}
.stbl-lbl{font-size:11px;font-weight:600;color:#718096;white-space:nowrap}
.stbl-v{text-align:left;white-space:nowrap}

.stbl-cur{display:inline-block;width:8px;height:8px;border-radius:50%;background:#38a169;box-shadow:0 0 0 2px rgba(56,161,105,.25);margin-left:6px;vertical-align:middle;cursor:help}
.stbl-warn .stbl-cur{background:#dd6b20;box-shadow:0 0 0 2px rgba(221,107,32,.25)}

.stbl-match td{background:#f0fff4}
.stbl-match .stbl-lbl{color:#276749}
.stbl-warn td{background:#fffbeb}
.stbl-warn .stbl-lbl{color:#975a16}

.stbl-collapsed .stbl-extra{display:none}
.stbl-toggle{color:#a0aec0;font-size:11px;margin-left:6px;vertical-align:middle}
.stbl-arrow{display:inline-block;transition:transform .15s;font-size:10px}
.stbl:not(.stbl-collapsed) .stbl-arrow{transform:rotate(90deg)}

.cache-dual{padding:0 2px 2px;font-size:13px;display:flex;align-items:center;gap:4px;color:#718096}
.stbl-sell td{border-bottom:none !important}
.stbl-sell .stbl-lbl{color:#2d3748;font-weight:700}
.stbl-sell-warn td{background:#fffbeb}
.stbl-sell-warn .stbl-lbl{color:#c05621}

.sell-warn{color:#dd6b20;margin-left:2px;font-size:14px;cursor:help}

.pc{white-space:nowrap}
.mono{font-family:'SF Mono',Menlo,'Courier New',monospace;font-weight:600;font-size:13.5px}
.na{color:#d0d5dd;font-weight:400}

.mg{display:inline-block;padding:1px 7px;border-radius:8px;font-size:11.5px;font-weight:600;white-space:nowrap;margin-left:4px}
.mg.drift{background:#fed7aa;color:#9a3412}
.mg.loss{background:#fed7d7;color:#c53030}
.mg.even{background:#fefcbf;color:#975a16}

.scol{position:relative;vertical-align:top !important;padding-top:14px !important;cursor:pointer}
.sarea{cursor:pointer;display:inline-flex;gap:4px;flex-wrap:wrap;padding:4px 6px;border-radius:6px;transition:background .12s}
.sarea:hover{background:#f0f2f5}
.sb{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11.5px;font-weight:600;border:1px solid}
.sb-pp{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7}
.sb-ll{background:#f3e5f5;color:#7b1fa2;border-color:#ce93d8}
.sb-or{background:#e3f2fd;color:#1565c0;border-color:#90caf9}
.sb-us{background:#fff3e0;color:#e65100;border-color:#ffcc80}
.sb-off{background:#f9fafb;color:#dce1e8;border-color:#edf0f4}
.sb-link{text-decoration:none;cursor:pointer}
.um-ll{margin-top:2px;font-size:11px;color:#7b1fa2}
.um-match{font-size:10px;padding:1px 4px;border-radius:4px;background:#e8f5e9;color:#2e7d32}
.um-close{font-size:10px;padding:1px 4px;border-radius:4px;background:#fff3e0;color:#e65100}
.um-diff{font-size:10px;padding:1px 4px;border-radius:4px;background:#fce4ec;color:#c62828}
.sb-link:hover .sb{opacity:.8;text-decoration:underline}
.sb-ext{font-size:10px;margin-left:2px;opacity:.6}
.sb-link:hover .sb-ext{opacity:1}

.pop{display:none;position:fixed;z-index:200;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.16);min-width:520px;max-width:calc(100vw - 32px);overflow:hidden}
.pop.open{display:block}
.parr{position:absolute;top:-6px;width:10px;height:10px;background:#fff;border:1px solid #e2e8f0;border-right:none;border-bottom:none;transform:rotate(45deg)}
.phd{padding:11px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;font-weight:600;font-size:13px;color:#2d3748}
.ptbl{width:100%;border-collapse:collapse;font-size:13px}
.ptbl th{padding:8px 12px;text-align:right;font-weight:600;color:#718096;font-size:11px;background:#f7fafc;border-bottom:1px solid #edf2f7;letter-spacing:.2px}
.ptbl th:first-child{text-align:left}
.ptbl td{padding:8px 12px;border-bottom:1px solid #f5f5f5;text-align:right}
.ptbl td:first-child{text-align:left}
.ptbl tr:last-child td{border-bottom:none}
.psell td{background:#fffbeb}
.lk{color:#4299e1;text-decoration:none;font-size:11px}
.lk:hover{text-decoration:underline}

.pcache{padding:8px 12px;background:#f7fafc;border-top:1px solid #edf2f7;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px}
.pcache-h{font-weight:600;color:#4a5568;white-space:nowrap}
.pcache-item{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#fff;border:1px solid #e2e8f0;border-radius:6px}
.pcache-lbl{color:#718096;font-size:11px}

.sec-unmatched{background:#eff6ff;border-color:#90cdf4}
.sec-unmatched .sec-h{border-color:#90cdf4}
.st.info .n{color:#3182ce}
.cnt.info{background:#bee3f8;color:#2b6cb0}
.type-tag{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:600;background:#edf2f7;color:#4a5568}
.um-row td{padding:8px 14px;border-bottom:1px solid #edf2f7;vertical-align:middle}
.um-row:hover td{background:rgba(255,255,255,.5)}
.um-row.um-checked td{background:rgba(49,130,206,.06)}
.um-row.um-checked:hover td{background:rgba(49,130,206,.10)}
.sec-sel-bar{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#a0aec0;cursor:pointer;margin-right:8px}
.sec-sel-bar:hover{color:#4a5568}
.sec-sel-bar .sec-sel-label{font-size:11px;white-space:nowrap}
.um-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f7fafc;border-bottom:1px solid #e2e8f0;gap:10px}
.um-toolbar-left{display:flex;align-items:center;gap:8px}
.um-toolbar-right{display:flex;align-items:center;gap:8px}
.um-btn{padding:3px 10px;border:1px solid #90cdf4;border-radius:5px;background:#fff;cursor:pointer;font-size:11px;color:#2b6cb0;transition:all .12s}
.um-btn:hover{background:#ebf8ff;border-color:#63b3ed}
.um-btn-reset{border-color:#e2e8f0;color:#718096}
.um-btn-reset:hover{background:#f7fafc;border-color:#cbd5e0}
.um-btn-quick{background:#ebf8ff;border-color:#63b3ed;color:#2b6cb0;font-weight:600}
.um-btn-quick:hover{background:#bee3f8}
.um-btn-quick.active{background:#3182ce;color:#fff;border-color:#2b6cb0}
.um-sep{width:1px;height:16px;background:#cbd5e0;margin:0 2px}

.empty{padding:20px;text-align:center;color:#a0aec0;font-size:14px}

.no-official{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:#fff3cd;color:#856404;border:1px solid #ffc107;margin-left:4px;vertical-align:middle}
.cnt.miss{background:#fff3cd;color:#856404}
.st.miss .n{color:#d69e2e}
.sec-sub{font-size:12px;color:#718096;font-weight:400;margin-left:4px}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}
.loading-spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:#4a5568;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-steps{text-align:left;font-size:14px}
.loading-steps .lstep{padding:6px 0;display:flex;align-items:center;gap:8px;color:#a0aec0}
.loading-steps .lstep.done{color:#38a169}
.loading-steps .lstep.active{color:#2d3748;font-weight:600}
.loading-steps .lstep .lcheck{width:18px;text-align:center}
.loading-error{margin-top:20px;padding:16px 24px;background:#fed7d7;color:#9b2c2c;border-radius:8px;max-width:600px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>AIGNE Hub 定价报告</h1>
    <div class="meta">生成时间：2026/3/20 01:03:58 &nbsp;|&nbsp; 成本优先级：官方 → LiteLLM → OpenRouter &nbsp;|&nbsp; 单一数据来源 &nbsp;|&nbsp; $/1M tokens &nbsp;|&nbsp; 图片 $/张 &nbsp;|&nbsp; 视频 $/sec</div>
  </div>

  <div id="loading-area" class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-steps">
      <div class="lstep active" id="ls-db"><span class="lcheck">○</span> 加载 DB 数据...</div>
      <div class="lstep" id="ls-ll"><span class="lcheck">○</span> 加载 LiteLLM 数据...</div>
      <div class="lstep" id="ls-or"><span class="lcheck">○</span> 加载 OpenRouter 数据...</div>
      <div class="lstep" id="ls-op"><span class="lcheck">○</span> 加载官方定价数据...</div>
      <div class="lstep" id="ls-calc"><span class="lcheck">○</span> 计算比较结果...</div>
      <div class="lstep" id="ls-render"><span class="lcheck">○</span> 渲染报告...</div>
    </div>
    <div id="loading-error" class="loading-error" style="display:none"></div>
  </div>

  <div id="app-content" style="display:none">
    <div id="db-status" style="display:none;padding:10px 18px;border-radius:8px;font-size:13px;margin-bottom:14px;transition:all .3s"></div>
    <div class="summary" id="summary-cards"></div>
    <div class="tb" id="toolbar"></div>
    <div id="sections"></div>

    <div class="sec" id="sync-panel" style="background:#fff;margin-top:24px">
      <div class="sec-h" style="cursor:default;background:linear-gradient(135deg,#2d3748,#4a5568)">
        <h2 style="color:#fff">API 同步面板</h2>
        <span class="sec-sub" style="color:rgba(255,255,255,.7)">预览变更 / 一键同步到数据库</span>
      </div>
      <div class="sec-body" style="padding:20px 24px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
          <div>
            <label style="font-size:13px;font-weight:600;color:#4a5568;display:block;margin-bottom:6px">API 地址</label>
            <input type="text" id="sync-url" value="" readonly style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f7fafc;color:#4a5568"/>
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:#4a5568;display:block;margin-bottom:6px">Access Token <span style="font-weight:400;color:#a0aec0;font-size:11px">(按域名自动保存)</span></label>
            <input type="password" id="sync-token" placeholder="输入管理员 Access Token" style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px"/>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#4a5568;cursor:pointer">
            <input type="checkbox" id="sync-apply-rates" checked onchange="document.getElementById('sync-rates-opts').style.display=this.checked?'flex':'none'"/> 同时更新售价
          </label>
          <span id="sync-rates-opts" style="display:flex;gap:12px;align-items:center">
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#718096">利润率%<input type="number" id="sync-margin" value="0" min="0" max="100" step="0.5" style="width:60px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;text-align:center"/></label>
            <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#718096" title="1 积分等于多少美元">积分单价 <span style="cursor:help;color:#a0aec0">&#9432;</span><input type="number" id="sync-credit-price" value="1" min="0.01" step="0.01" style="width:60px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;text-align:center"/></label>
          </span>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#4a5568;cursor:pointer">
            <input type="checkbox" id="sync-deprecate" checked/> 软删除未匹配模型
          </label>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:20px;align-items:center">
          <span style="font-size:13px;color:#4a5568">已录入 <strong id="sync-sel-cnt">0</strong> 个 &nbsp;|&nbsp; 未录入 <strong id="sync-um-cnt" style="color:#3182ce">0</strong> 个<span style="font-size:11px;color:#a0aec0;margin-left:2px">(新增)</span> &nbsp;|&nbsp; 待删除 <strong id="sync-del-cnt" style="color:#e53e3e">0</strong> 个</span>
          <button onclick="toggleSyncAll(true)" style="padding:4px 12px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#4a5568">全选已录入</button>
          <button onclick="toggleSyncAll(false)" style="padding:4px 12px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#4a5568">取消全选</button>
          <button onclick="doRefreshDb()" style="padding:6px 14px;background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap">刷新 DB 数据</button>

/**
 * Shared Pricing Core — pure computation functions used by both Node.js CLI and browser HTML.
 *
 * Rules:
 * - Pure .mjs — no TypeScript, no external dependencies
 * - All functions use `export function` syntax (stripped to bare `function` when inlined in HTML)
 * - No cross-module imports — this file is self-contained
 * - No side effects (console.log, DOM, fetch, etc.)
 */

// ─── Provider Aliases & Normalization ─────────────────────────────────────────

const PROVIDER_ALIASES = {
  gemini: 'google',
  vertex_ai: 'google',
  vertex_ai_beta: 'google',
  google: 'google',
  anthropic: 'anthropic',
  openai: 'openai',
  'text-completion-openai': 'openai',
  chatgpt: 'openai',
  deepseek: 'deepseek',
  xai: 'xai',
  'x-ai': 'xai',
  openrouter: 'openrouter',
  volcengine: 'doubao',
};

const PROVIDER_TIERS = {
  tier1: ['openai', 'anthropic', 'google', 'xai', 'deepseek', 'doubao'],
  tier2: ['poe', 'openrouter', 'rock'],
};

const MODEL_NAME_OVERRIDES = {
  'gemini-flash-2.5': 'gemini-2.5-flash',
  'gpt-3.5-turbo-instruct': 'gpt-3.5-turbo-instruct',
};

const MODEL_PREFIX_TO_PROVIDER = {
  'claude-': 'anthropic',
  'gpt-': 'openai',
  'o1-': 'openai',
  'o3-': 'openai',
  'o4-': 'openai',
  'gemini-': 'google',
  'grok-': 'xai',
  'deepseek-': 'deepseek',
};

const PRICING_URLS = {
  anthropic: 'https://docs.anthropic.com/en/docs/about-claude/pricing',
  google: 'https://ai.google.dev/gemini-api/docs/pricing',
  deepseek: 'https://api-docs.deepseek.com/quick_start/pricing',
  xai: 'https://docs.x.ai/developers/models',
  openai: 'https://platform.openai.com/docs/pricing',
  doubao: 'https://www.volcengine.com/docs/82379/1544106',
  openrouter: 'https://openrouter.ai/models',
  bedrock: 'https://aws.amazon.com/bedrock/pricing/',
  ideogram: 'https://ideogram.ai/pricing',
  poe: 'https://poe.com/api/models',
};

const PROV_NAMES = {
  google: 'Google',
  openai: 'OpenAI',
  anthropic: 'Anthropic',
  deepseek: 'DeepSeek',
  xai: 'xAI',
  openrouter: 'OpenRouter',
  doubao: 'Doubao',
  ideogram: 'Ideogram',
  minimax: 'MiniMax',
  bedrock: 'Bedrock',
  poe: 'Poe',
};

function provName(p) {
  return PROV_NAMES[p.toLowerCase()] || p.charAt(0).toUpperCase() + p.slice(1);
}

/**
 * Normalize a provider name to the canonical DB provider name.
 * Tries exact match first, then prefix match (e.g. "vertex_ai_beta" via "vertex_ai").
 * Returns undefined if no match found.
 */
function normalizeProvider(name) {
  const lower = name.toLowerCase();
  if (PROVIDER_ALIASES[lower]) return PROVIDER_ALIASES[lower];
  for (const [alias, canonical] of Object.entries(PROVIDER_ALIASES)) {
    if (lower.startsWith(alias)) return canonical;
  }
  if (lower.startsWith('bedrock')) return 'bedrock';
  return undefined;
}

/**
 * Generate fallback model name variants for lookup.
 */
function modelNameFallbacks(model) {
  if (MODEL_NAME_OVERRIDES[model]) {
    return [MODEL_NAME_OVERRIDES[model]];
  }
  const fallbacks = [];
  // claude-xxx-N-0 → claude-xxx-N
  if (/^claude-.*-\d+-0$/.test(model)) {
    fallbacks.push(model.replace(/-0$/, ''));
  }
  // gpt-4o-2024-08-06 → gpt-4o (date suffix)
  const dateMatch = model.match(/^(.+)-(\d{4}-\d{2}-\d{2})$/);
  if (dateMatch?.[1]) {
    fallbacks.push(dateMatch[1]);
  }
  return fallbacks;
}

/**
 * For tier2 providers, resolve the underlying tier1 provider and model name.
 */
function resolveModelMapping(dbModel, dbProvider) {
  const canonicalProvider = normalizeProvider(dbProvider) || dbProvider;
  const isTier2 = PROVIDER_TIERS.tier2.includes(canonicalProvider);
  const resolvedModel = MODEL_NAME_OVERRIDES[dbModel] || dbModel;

  if (!isTier2) {
    return { primaryProvider: canonicalProvider, primaryModel: resolvedModel };
  }

  // OpenRouter: "anthropic/claude-sonnet-4" → split on /
  if (canonicalProvider === 'openrouter' && resolvedModel.includes('/')) {
    const slashIdx = resolvedModel.indexOf('/');
    const providerPrefix = resolvedModel.slice(0, slashIdx);
    const modelName = resolvedModel.slice(slashIdx + 1);
    const mappedProvider = normalizeProvider(providerPrefix);
    if (mappedProvider && PROVIDER_TIERS.tier1.includes(mappedProvider)) {
      return { primaryProvider: mappedProvider, primaryModel: modelName };
    }
  }

  // Poe and others: infer provider from model name prefix
  for (const [prefix, provider] of Object.entries(MODEL_PREFIX_TO_PROVIDER)) {
    if (resolvedModel.startsWith(prefix)) {
      return { primaryProvider: provider, primaryModel: resolvedModel };
    }
  }

  return { primaryProvider: canonicalProvider, primaryModel: resolvedModel };
}

/**
 * Derive resolution tiers for image models with per-image and per-image-token pricing.
 */
function deriveResolutionTiers(outputCostPerImage, outputCostPerImageToken) {
  if (outputCostPerImage == null || outputCostPerImageToken == null) return undefined;
  if (outputCostPerImageToken === 0) return undefined;

  const stdTokens = Math.round(outputCostPerImage / outputCostPerImageToken);
  const hiTokens = Math.round(stdTokens * 1.786);
  const stdCost = outputCostPerImage;
  const hiCost = outputCostPerImageToken * hiTokens;

  if (Math.abs(hiCost - stdCost) / stdCost <= 0.05) return undefined;

  return [
    { quality: '1K-2K', size: `~${stdTokens}tok`, costPerImage: stdCost },
    { quality: '4K', size: `~${hiTokens}tok`, costPerImage: hiCost },
  ];
}

// ─── Math Utilities ───────────────────────────────────────────────────────────

function calcDrift(dbValue, sourceValue) {
  const maxVal = Math.max(Math.abs(dbValue), Math.abs(sourceValue));
  if (maxVal === 0) return 0;
  return Math.abs(dbValue - sourceValue) / maxVal;
}

function calcMargin(sell, cost) {
  if (sell === undefined || sell === null || cost === undefined || cost === null || cost === 0) return undefined;
  return ((sell - cost) / cost) * 100;
}

function closeEnough(a, b, tol) {
  if (tol === undefined) tol = 0.02;
  return a != null && b != null && b !== 0 && Math.abs(a - b) / Math.abs(b) < tol;
}

function aboveOrClose(sell, cost, tol) {
  if (tol === undefined) tol = 0.005;
  return sell != null && cost != null && cost > 0 && sell >= cost * (1 - tol);
}

// ─── Formatting ───────────────────────────────────────────────────────────────

/**
 * Format a price value for display (plain text).
 * @param {number} v - price in $/token, $/image, or $/second
 * @param {string} unit - 'per-token' | 'per-image' | 'per-second'
 * @returns {string}
 */
function formatPrice(v, unit) {
  if (unit === undefined) unit = 'per-token';
  if (v === undefined || v === null) return '-';
  const n = Number(v);
  if (isNaN(n)) return '-';
  if (n === 0) return '$0';
  if (unit === 'per-image') return '$' + n.toFixed(4) + '/张';
  if (unit === 'per-second') return '$' + n.toFixed(4) + '/sec';
  // per-token: display as $/MTok
  const mtok = n * 1e6;
  if (mtok < 0.0001) return '$' + mtok.toFixed(7);
  if (mtok < 0.01) return '$' + mtok.toFixed(5);
  if (mtok < 1) return '$' + mtok.toFixed(3);
  if (mtok < 10) return '$' + mtok.toFixed(2);
  return '$' + mtok.toFixed(1);
}

/**
 * Format price as HTML (with <span class="na">-</span> for nulls).
 */
function formatPriceHtml(v, pricingUnit) {
  if (v === undefined || v === null) return '<span class="na">-</span>';
  if (v === 0) return '$0';
  if (pricingUnit === 'per-image') return '$' + Number(v).toFixed(4) + '/张';
  if (pricingUnit === 'per-second') return '$' + Number(v).toFixed(4) + '/sec';
  const p = v * 1e6;
  if (p < 0.0001) return '$' + p.toFixed(7);
  if (p < 0.01) return '$' + p.toFixed(5);
  if (p < 1) return '$' + p.toFixed(3);
  return '$' + p.toFixed(2);
}

// ─── Classification ───────────────────────────────────────────────────────────

function isPerUnitPricing(m) {
  return m.pricingUnit === 'per-image' || m.pricingUnit === 'per-second';
}

/**
 * Get the highest-tier costs for margin comparison.
 * For tiered pricing: use highest tier. For resolution tiers: use max costPerImage.
 */
function getMarginCosts(entry) {
  var costIn = entry.inputCostPerToken;
  var costOut = entry.outputCostPerToken;
  if (entry.tieredPricing && entry.tieredPricing.length) {
    var hi = entry.tieredPricing[entry.tieredPricing.length - 1];
    if (hi.input) costIn = hi.input;
    if (hi.output) costOut = hi.output;
  }
  if (entry.resolutionTiers && entry.resolutionTiers.length) {
    var maxCPI = 0;
    entry.resolutionTiers.forEach(function (t) {
      if (t.costPerImage > maxCPI) maxCPI = t.costPerImage;
    });
    if (maxCPI) costOut = maxCPI;
  }
  return { input: costIn, output: costOut };
}

/**
 * Check if a model has below-cost pricing (sell < cost).
 * @param {object} m - comparison result or entry+rate hybrid
 * @param {number} threshold - percentage threshold (default 2)
 */
function hasBelowCost(m, threshold) {
  if (threshold === undefined) threshold = 2;
  const isUnit = isPerUnitPricing(m);
  if (
    (m.outputMargin != null && m.outputMargin < -threshold) ||
    (!isUnit && m.inputMargin != null && m.inputMargin < -threshold)
  )
    return true;
  // Cache write: cost exists but sell is missing or below cost
  const cw = m.bestCostCacheWrite;
  const sw = m.dbCacheWrite;
  if (cw > 0 && (!sw || ((sw - cw) / cw) * 100 < -threshold)) return true;
  // Cache read: cost exists but sell is missing or below cost
  const cr = m.bestCostCacheRead;
  const sr = m.dbCacheRead;
  if (cr > 0 && (!sr || ((sr - cr) / cr) * 100 < -threshold)) return true;
  return false;
}

/**
 * Check if a model has sell price drift (DB sell vs best-cost margin exceeds threshold).
 */
function hasDrift(m, threshold) {
  if (threshold === undefined) threshold = 2;
  const isUnit = isPerUnitPricing(m);
  const inputOff = !isUnit && m.inputMargin != null && Math.abs(m.inputMargin) > threshold;
  const outputOff = m.outputMargin != null && Math.abs(m.outputMargin) > threshold;
  if (inputOff || outputOff) return true;
  if (m.cacheTierWriteDrift > 0 || m.cacheTierReadDrift > 0) return true;
  // Cache read/write: DB value vs best source reference (bidirectional)
  const cw = m.bestCostCacheWrite;
  if (cw > 0 && m.dbCacheWrite > 0) {
    if (Math.abs(((m.dbCacheWrite - cw) / cw) * 100) > threshold) return true;
  }
  const cr = m.bestCostCacheRead;
  if (cr > 0 && m.dbCacheRead > 0) {
    if (Math.abs(((m.dbCacheRead - cr) / cr) * 100) > threshold) return true;
  }
  return false;
}

/**
 * Check if sell price is not at highest tier (potential loss at high volume).
 */
function hasNotHighestTier(m) {
  const sO = m.outputRate ?? m.dbOutput;
  const sI = m.inputRate ?? m.dbInput;
  if (m.tieredPricing?.length) {
    const hi = m.tieredPricing[m.tieredPricing.length - 1];
    if (!aboveOrClose(sO, hi.output) || (!isPerUnitPricing(m) && !aboveOrClose(sI, hi.input))) return true;
  }
  if (m.resolutionTiers?.length) {
    const maxCost = Math.max(...m.resolutionTiers.map((t) => t.costPerImage));
    if (!aboveOrClose(sO, maxCost)) return true;
  }
  if (m.bestCostCacheTiers?.length) {
    const writeTiers = m.bestCostCacheTiers.filter((t) => t.label.includes('write'));
    if (writeTiers.length > 1) {
      const maxWrite = Math.max(...writeTiers.map((t) => t.costPerToken));
      const dbCW = m.dbCacheWrite ?? 0;
      if (!aboveOrClose(dbCW, maxWrite)) return true;
    }
  }
  return false;
}

function hasNoData(m) {
  return (
    !m.bestCostOutput &&
    !m.bestCostInput &&
    !m.providerPageInput &&
    !m.litellmInput &&
    !m.openrouterInput &&
    !m.litellmOutputPerImage &&
    !m.litellmOutputPerSecond
  );
}

function hasNoOfficial(m) {
  return (
    m.providerPageInput === undefined &&
    m.providerPageOutput === undefined &&
    !(m.provider === 'openrouter' && m.openrouterInput !== undefined)
  );
}

/**
 * Classify a model into one of: 'deprecated' | 'below-cost' | 'drift' | 'no-match' | 'normal'.
 */
function classifyModel(m) {
  if (m.deprecated) return 'deprecated';
  if (hasBelowCost(m) || hasNotHighestTier(m)) return 'below-cost';
  if (hasDrift(m)) return 'drift';
  if (hasNoOfficial(m) || hasNoData(m)) return 'no-match';
  return 'normal';
}

/**
 * Classify and group models into 4 sections.
 * Returns { belowCost, drift, noMatch, normal } arrays.
 */
function classifyAndGroup(models) {
  const deprecated = [];
  const deprecatedKeys = new Set();
  const belowCost = [];
  const drift = [];
  const noMatch = [];
  const normal = [];
  const belowCostKeys = new Set();
  const driftKeys = new Set();

  // Pass 0: deprecated (highest priority — already removed from service)
  for (const m of models) {
    if (m.deprecated) {
      deprecated.push(m);
      deprecatedKeys.add(`${m.provider}/${m.model}`);
    }
  }
  // Pass 1: below-cost
  for (const m of models) {
    const key = `${m.provider}/${m.model}`;
    if (!deprecatedKeys.has(key) && (hasBelowCost(m) || hasNotHighestTier(m))) {
      belowCost.push(m);
      belowCostKeys.add(key);
    }
  }
  // Pass 2: drift
  for (const m of models) {
    const key = `${m.provider}/${m.model}`;
    if (!deprecatedKeys.has(key) && !belowCostKeys.has(key) && hasDrift(m)) {
      drift.push(m);
      driftKeys.add(key);
    }
  }
  // Pass 3: no-match
  for (const m of models) {
    const key = `${m.provider}/${m.model}`;
    if (
      !deprecatedKeys.has(key) &&
      !belowCostKeys.has(key) &&
      !driftKeys.has(key) &&
      (hasNoOfficial(m) || hasNoData(m))
    ) {
      noMatch.push(m);
    }
  }
  // Pass 4: normal (everything else)
  const usedKeys = new Set([
    ...deprecatedKeys,
    ...belowCostKeys,
    ...driftKeys,
    ...noMatch.map((m) => `${m.provider}/${m.model}`),
  ]);
  for (const m of models) {
    if (!usedKeys.has(`${m.provider}/${m.model}`)) {
      normal.push(m);
    }
  }

  return { deprecated, belowCost, drift, noMatch, normal };
}

/**
 * Recalculate classification from entry (cost data) + rate (sell data).
 * Used by client-side recategorization after DB refresh.
 */
function classifyFromEntryAndRate(entry, rate, isNoOfficial) {
  if (entry.deprecated) return 'deprecated';
  const isUnit = entry.modelType === 'imageGeneration' || entry.modelType === 'video';
  const sI = rate.inputRate,
    sO = rate.outputRate;

  // Base cost = official/external price (before tiers)
  const baseCostI = entry.inputCostPerToken;
  const baseCostO = entry.outputCostPerToken;

  // Highest-tier cost for margin comparison (sell price vs max cost)
  const mc = getMarginCosts(entry);
  const cI = entry.bestCostInput || mc.input;
  const cO = entry.bestCostOutput || mc.output;
  const mI = !isUnit && cI ? ((sI - cI) / cI) * 100 : null;
  const mO = cO ? ((sO - cO) / cO) * 100 : null;
  const DTH = 2;

  // DB unitCosts for cost drift check (unitCost vs base official price)
  const dbUcI = rate.unitCosts?.input || 0;
  const dbUcO = rate.unitCosts?.output || 0;

  const ct = entry.cacheTiers || [];
  const wt = ct.filter(function (t) {
    return t.label.indexOf('write') >= 0;
  });
  const rc = entry.cachedInputCostPerToken || 0;
  const mwc = wt.length
    ? Math.max(
        ...wt.map(function (t) {
          return t.costPerToken;
        })
      )
    : 0;
  const sCW = rate.cacheWriteRate || 0,
    sCR = rate.cacheReadRate || 0;

  // Below-cost check
  var bc = false;
  if (mO != null && mO < -DTH) bc = true;
  if (!isUnit && mI != null && mI < -DTH) bc = true;
  if (mwc > 0 && (!sCW || ((sCW - mwc) / mwc) * 100 < -DTH)) bc = true;
  if (rc > 0 && (!sCR || ((sCR - rc) / rc) * 100 < -DTH)) bc = true;

  // Not-highest-tier check
  var nht = false;
  if (entry.tieredPricing && entry.tieredPricing.length) {
    var hi = entry.tieredPricing[entry.tieredPricing.length - 1];
    if (!aboveOrClose(sO, hi.output) || (!isUnit && !aboveOrClose(sI, hi.input))) nht = true;
  }
  if (entry.resolutionTiers && entry.resolutionTiers.length) {
    var mx = Math.max(
      ...entry.resolutionTiers.map(function (t) {
        return t.costPerImage;
      })
    );
    if (!aboveOrClose(sO, mx)) nht = true;
  }
  if (wt.length > 1) {
    var mw = Math.max(
      ...wt.map(function (t) {
        return t.costPerToken;
      })
    );
    if (!aboveOrClose(sCW, mw)) nht = true;
  }

  if (bc || nht) return 'below-cost';

  // When sell price matches highest tier, drift against base price is expected — skip margin/cost drift.
  var sellMatchesTier = false;
  if (!nht && entry.tieredPricing && entry.tieredPricing.length > 0) {
    var hi = entry.tieredPricing[entry.tieredPricing.length - 1];
    if (aboveOrClose(sI, hi.input) && aboveOrClose(sO, hi.output)) sellMatchesTier = true;
  }

  // Drift check — sell margin drift
  var dr = false;
  if (!sellMatchesTier) {
    if (!isUnit && mI != null && Math.abs(mI) > DTH) dr = true;
    if (mO != null && Math.abs(mO) > DTH) dr = true;
  }
  if (mwc > 0 && sCW > 0 && Math.abs(((sCW - mwc) / mwc) * 100) > DTH) dr = true;
  if (rc > 0 && sCR > 0 && Math.abs(((sCR - rc) / rc) * 100) > DTH) dr = true;

  // Cost drift check — DB unitCosts vs base official/external price
  if (!sellMatchesTier) {
    if (!isUnit && baseCostI && dbUcI > 0) {
      var ucDriftI = Math.abs((dbUcI - baseCostI) / baseCostI) * 100;
      if (ucDriftI > 10) dr = true;
    }
    if (baseCostO && dbUcO > 0) {
      var ucDriftO = Math.abs((dbUcO - baseCostO) / baseCostO) * 100;
      if (ucDriftO > 10) dr = true;
    }
  }

  // Preserve initial drift classification from multi-source comparison (LiteLLM/OpenRouter/official).
  if (!dr && !sellMatchesTier && entry.initialMaxDrift > 0.1) {
    var ucUnchanged = true;
    if (baseCostI && dbUcI > 0 && Math.abs((dbUcI - baseCostI) / baseCostI) > 0.001) ucUnchanged = false;
    if (baseCostO && dbUcO > 0 && Math.abs((dbUcO - baseCostO) / baseCostO) > 0.001) ucUnchanged = false;
    if (ucUnchanged) dr = true;
  }

  if (dr) return 'drift';

  if (isNoOfficial) return 'no-match';
  return 'normal';
}

// ─── Type Priority & Compatibility ───────────────────────────────────────────

/**
 * Model type priority for base-key preference and lookup ordering.
 * Lower number = higher priority.
 * Standard (chatCompletion) > lexicon > ... > fineTuning (lowest)
 */
const MODEL_TYPE_PRIORITY = {
  chatCompletion: 0,
  lexicon: 1,
  embedding: 2,
  imageGeneration: 3,
  video: 4,
  audio: 5,
  transcription: 6,
  tool: 7,
  fineTuning: 8,
};

/**
 * Get numeric priority for a model type (lower = higher priority).
 */
function typePriority(type) {
  if (!type) return 99;
  return MODEL_TYPE_PRIORITY[type] ?? 50;
}

/**
 * Get equivalent type keys to try when the exact dbType has no match in cache.
 * e.g. lexicon → try chatCompletion; chatCompletion → no extra equivalents needed.
 */
function getEquivalentTypes(dbType) {
  if (!dbType) return [];
  // lexicon should match chatCompletion pricing (standard inference), never fineTuning
  if (dbType === 'lexicon') return ['chatCompletion'];
  return [];
}

/**
 * Check if a cache entry's modelType is compatible with a DB rate's type.
 */
function isTypeCompatible(dbType, cacheType) {
  if (!cacheType || !dbType) return true;
  if (dbType === cacheType) return true;
  // lexicon ↔ chatCompletion → compatible (lexicon uses standard pricing)
  if (
    (dbType === 'lexicon' && cacheType === 'chatCompletion') ||
    (dbType === 'chatCompletion' && cacheType === 'lexicon')
  )
    return true;
  // lexicon ↔ fineTuning → incompatible (lexicon should NOT use fineTuning pricing)
  if ((dbType === 'lexicon' && cacheType === 'fineTuning') || (dbType === 'fineTuning' && cacheType === 'lexicon'))
    return false;
  // chatCompletion ↔ fineTuning → incompatible
  if (
    (dbType === 'chatCompletion' && cacheType === 'fineTuning') ||
    (dbType === 'fineTuning' && cacheType === 'chatCompletion')
  )
    return false;
  // chatCompletion ↔ imageGeneration → incompatible
  if (
    (dbType === 'chatCompletion' && cacheType === 'imageGeneration') ||
    (dbType === 'imageGeneration' && cacheType === 'chatCompletion')
  )
    return false;
  // chatCompletion ↔ audio → incompatible
  if ((dbType === 'chatCompletion' && cacheType === 'audio') || (dbType === 'audio' && cacheType === 'chatCompletion'))
    return false;
  return true;
}

/**
 * Look up official pricing with type awareness and priority.
 *
 * Lookup order for a given key:
 *   1. Exact type match (key::dbType)
 *   2. Equivalent types (e.g. lexicon → key::chatCompletion)
 *   3. Base key (if type-compatible)
 * Then repeat for each fallback key.
 *
 * @param {Map} cache
 * @param {string} lookupKey
 * @param {string[]} fallbackKeys
 * @param {string} dbType
 */
function lookupOfficialPricing(cache, lookupKey, fallbackKeys, dbType) {
  const equivalents = getEquivalentTypes(dbType);
  const allKeys = [lookupKey, ...fallbackKeys];

  for (const key of allKeys) {
    // 1. Exact type match
    if (dbType) {
      const typed = cache.get(`${key}::${dbType}`);
      if (typed) return typed;
    }
    // 2. Equivalent types (priority order)
    for (const eqType of equivalents) {
      const typed = cache.get(`${key}::${eqType}`);
      if (typed) return typed;
    }
    // 3. Base key (if compatible)
    const base = cache.get(key);
    if (base && isTypeCompatible(dbType, base.modelType)) return base;
  }
  return undefined;
}

// ─── Best Cost Selection ─────────────────────────────────────────────────────

/**
 * Select the best cost source and calculate margins.
 * Single Data Source Principle: all fields (input, output, cache write, cache read)
 * come from the SAME source. Priority: Official > LiteLLM > OpenRouter.
 * Mutates `result` in place.
 */
function pickBestCost(result) {
  var isPerUnit = result.pricingUnit === 'per-image' || result.pricingUnit === 'per-second';

  // Determine which sources have data
  var hasOfficial = result.providerPageInput !== undefined || result.providerPageOutput !== undefined;
  var hasLiteLLM =
    result.litellmInput !== undefined ||
    result.litellmOutput !== undefined ||
    result.litellmOutputPerImage !== undefined ||
    result.litellmOutputPerSecond !== undefined;
  var hasOpenRouter = result.openrouterInput !== undefined && result.openrouterOutput !== undefined;

  // Pre-compute resolution tier max cost (source-agnostic structural data)
  var resMax = 0;
  if (result.pricingUnit === 'per-image' && result.resolutionTiers?.length) {
    resMax = Math.max(
      ...result.resolutionTiers.map(function (t) {
        return t.costPerImage;
      })
    );
  }

  if (isPerUnit) {
    // Per-unit (image/video): Official > LiteLLM > OpenRouter
    if (hasOfficial && result.providerPageOutput !== undefined) {
      result.bestCostOutput = resMax || result.providerPageOutput;
      result.bestCostInput = result.providerPageInput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    } else if (result.pricingUnit === 'per-image' && hasLiteLLM && result.litellmOutputPerImage !== undefined) {
      result.bestCostOutput = resMax || result.litellmOutputPerImage;
      result.bestCostInput = result.litellmInputPerImage ?? result.litellmInput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    } else if (result.pricingUnit === 'per-second' && hasLiteLLM && result.litellmOutputPerSecond !== undefined) {
      result.bestCostOutput = result.litellmOutputPerSecond;
      result.bestCostInput = result.litellmInput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    } else if (hasOpenRouter) {
      result.bestCostInput = result.openrouterInput;
      result.bestCostOutput = result.openrouterOutput;
      result.bestCostSource = 'openrouter';
      result.bestCostSourceLabel = 'OpenRouter';
    } else if (hasLiteLLM && result.litellmInput !== undefined) {
      result.bestCostInput = result.litellmInput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    }
  } else {
    // Per-token: Official > LiteLLM > OpenRouter (require both input+output)
    if (result.providerPageInput !== undefined && result.providerPageOutput !== undefined) {
      result.bestCostInput = result.providerPageInput;
      result.bestCostOutput = result.providerPageOutput;
      result.bestCostSource = 'provider-page';
      result.bestCostSourceLabel = '官方';
      result.bestCostUrl = result.providerPageUrl;
    } else if (result.litellmInput !== undefined && result.litellmOutput !== undefined) {
      result.bestCostInput = result.litellmInput;
      result.bestCostOutput = result.litellmOutput;
      result.bestCostSource = 'litellm';
      result.bestCostSourceLabel = 'LiteLLM';
    } else if (hasOpenRouter) {
      result.bestCostInput = result.openrouterInput;
      result.bestCostOutput = result.openrouterOutput;
      result.bestCostSource = 'openrouter';
      result.bestCostSourceLabel = 'OpenRouter';
    }
  }

  // Cache from the SAME winning source (single data source principle)
  if (result.bestCostSource === 'provider-page') {
    result.bestCostCacheWrite = result.officialCacheWrite ?? null;
    result.bestCostCacheRead = result.officialCacheRead ?? null;
    result.bestCostCacheTiers = result.officialCacheTiers ?? null;
  } else if (result.bestCostSource === 'litellm') {
    result.bestCostCacheWrite = result.litellmCacheWrite ?? null;
    result.bestCostCacheRead = result.litellmCacheRead ?? null;
    result.bestCostCacheTiers = null;
  } else {
    result.bestCostCacheWrite = null;
    result.bestCostCacheRead = null;
    result.bestCostCacheTiers = null;
  }

  // Calculate margins
  if (result.bestCostInput !== undefined && result.inputRate !== undefined && result.bestCostInput > 0) {
    result.inputMargin = ((result.inputRate - result.bestCostInput) / result.bestCostInput) * 100;
  }
  if (result.bestCostOutput !== undefined && result.outputRate !== undefined && result.bestCostOutput > 0) {
    result.outputMargin = ((result.outputRate - result.bestCostOutput) / result.bestCostOutput) * 100;
  }
}

/**
 * Compute maxDrift from the single best source only.
 */
function singleSourceMaxDrift(result) {
  var ssd = 0;
  if (result.bestCostSource === 'provider-page') {
    ssd = Math.max(result.providerPageDrift ?? 0, result.cacheTierWriteDrift ?? 0, result.cacheTierReadDrift ?? 0);
  } else if (result.bestCostSource === 'litellm') {
    ssd = Math.max(result.litellmDrift ?? 0, result.cacheDrift ?? 0);
  } else if (result.bestCostSource === 'openrouter') {
    ssd = result.openrouterDrift ?? 0;
  }
  return ssd;
}

// ─── Core Compare Engine ─────────────────────────────────────────────────────

/**
 * Compare DB rates against external sources and produce structured comparison results.
 * @param {Array} dbRates
 * @param {Map} litellm
 * @param {Map} openrouter
 * @param {Map} providerPages - official pricing cache
 * @param {number} threshold
 * @returns {Array} ComparisonResult[]
 */
function compare(dbRates, litellm, openrouter, providerPages, threshold) {
  const results = [];

  for (const rate of dbRates) {
    const providerName = rate.provider?.name || '';
    const lookupKey = providerName === 'openrouter' ? rate.model : `${providerName}/${rate.model}`;
    const dbInput = Number(rate.unitCosts?.input ?? rate.inputRate ?? 0);
    const dbOutput = Number(rate.unitCosts?.output ?? rate.outputRate ?? 0);

    const modelFallbacks = modelNameFallbacks(rate.model);
    const fallbackKeys = modelFallbacks.map((m) => (providerName === 'openrouter' ? m : `${providerName}/${m}`));

    // LiteLLM lookup with fallbacks
    let ll = litellm.get(lookupKey);
    if (!ll && providerName === 'openrouter') {
      ll = litellm.get(`openrouter/${rate.model}`);
    }
    if (!ll) {
      const modelOnly = rate.model;
      for (const tryProvider of ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai']) {
        const found = litellm.get(`${tryProvider}/${modelOnly}`);
        if (found) {
          ll = found;
          break;
        }
      }
    }
    if (!ll) {
      for (const fbKey of fallbackKeys) {
        ll = litellm.get(fbKey);
        if (ll) break;
      }
      if (!ll) {
        for (const fbModel of modelFallbacks) {
          for (const tryProvider of ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai']) {
            ll = litellm.get(`${tryProvider}/${fbModel}`);
            if (ll) break;
          }
          if (ll) break;
        }
      }
    }

    const or = openrouter.get(lookupKey) ?? fallbackKeys.reduce((found, k) => found ?? openrouter.get(k), undefined);

    const pp = lookupOfficialPricing(providerPages, lookupKey, fallbackKeys, rate.type);

    const pricingUnit =
      rate.type === 'imageGeneration' ? 'per-image' : rate.type === 'video' ? 'per-second' : 'per-token';
    const isPerUnit = pricingUnit !== 'per-token';

    let maxDrift = 0;
    const result = {
      provider: providerName,
      model: rate.model,
      type: rate.type,
      pricingUnit,
      dbInput,
      dbOutput,
      maxDrift: 0,
      exceedsThreshold: false,
      hasPricingIssue: false,
    };

    if (ll) {
      result.litellmInput = ll.inputCostPerToken;
      result.litellmOutput = ll.outputCostPerToken;
      if (ll.tieredPricing) result.tieredPricing = ll.tieredPricing;
      if (ll.resolutionTiers) result.resolutionTiers = ll.resolutionTiers;

      if (
        pricingUnit === 'per-image' &&
        !result.resolutionTiers &&
        ll.outputCostPerImage != null &&
        ll.outputCostPerImageToken != null
      ) {
        const derived = deriveResolutionTiers(ll.outputCostPerImage, ll.outputCostPerImageToken);
        if (derived) result.resolutionTiers = derived;
      }

      if (pricingUnit === 'per-image') {
        const llOutputPerImage = ll.outputCostPerImage ?? ll.inputCostPerImage;
        if (ll.inputCostPerImage !== undefined) result.litellmInputPerImage = ll.inputCostPerImage;
        if (llOutputPerImage !== undefined) {
          result.litellmOutputPerImage = llOutputPerImage;
          const outputDrift = calcDrift(dbOutput, llOutputPerImage);
          const inputDrift =
            ll.inputCostPerToken !== undefined && dbInput > 0 ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
          result.litellmDrift = Math.max(inputDrift, outputDrift);
        } else {
          const inputDrift = ll.inputCostPerToken !== undefined ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
          result.litellmDrift = inputDrift;
        }
      } else if (pricingUnit === 'per-second') {
        const llOutputPerSecond = ll.outputCostPerVideoPerSecond;
        if (llOutputPerSecond !== undefined) {
          result.litellmOutputPerSecond = llOutputPerSecond;
          result.litellmDrift = calcDrift(dbOutput, llOutputPerSecond);
        } else {
          result.litellmDrift = 0;
        }
      } else {
        const inputDrift = ll.inputCostPerToken !== undefined ? calcDrift(dbInput, ll.inputCostPerToken) : 0;
        const outputDrift = ll.outputCostPerToken !== undefined ? calcDrift(dbOutput, ll.outputCostPerToken) : 0;
        result.litellmDrift = Math.max(inputDrift, outputDrift);
      }
      if (result.litellmDrift !== undefined) {
        maxDrift = Math.max(maxDrift, result.litellmDrift);
      }
    }

    if (or && or.inputCostPerToken !== undefined && or.outputCostPerToken !== undefined) {
      const inputDrift = calcDrift(dbInput, or.inputCostPerToken);
      result.openrouterInput = or.inputCostPerToken;
      result.openrouterOutput = or.outputCostPerToken;
      if (isPerUnit) {
        result.openrouterDrift = inputDrift;
      } else {
        const outputDrift = calcDrift(dbOutput, or.outputCostPerToken);
        result.openrouterDrift = Math.max(inputDrift, outputDrift);
      }
      maxDrift = Math.max(maxDrift, result.openrouterDrift);
    }

    const dbCacheWrite = rate.caching ? Number(rate.caching.writeRate ?? 0) : 0;
    const dbCacheRead = rate.caching ? Number(rate.caching.readRate ?? 0) : 0;

    if (pp) {
      if (pricingUnit === 'per-image' && pp.costPerImage != null) {
        result.providerPageOutput = pp.costPerImage;
        result.providerPageDrift = calcDrift(dbOutput, pp.costPerImage);
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pricingUnit === 'per-second' && pp.costPerSecond != null) {
        result.providerPageOutput = pp.costPerSecond;
        result.providerPageDrift = calcDrift(dbOutput, pp.costPerSecond);
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pp.inputCostPerToken != null && pp.outputCostPerToken != null) {
        const inputDrift = calcDrift(dbInput, pp.inputCostPerToken);
        result.providerPageInput = pp.inputCostPerToken;
        result.providerPageOutput = pp.outputCostPerToken;
        if (isPerUnit) {
          result.providerPageDrift = inputDrift;
        } else {
          const outputDrift = calcDrift(dbOutput, pp.outputCostPerToken);
          result.providerPageDrift = Math.max(inputDrift, outputDrift);
        }
        result.providerPageUrl = pp.sourceUrl;
        maxDrift = Math.max(maxDrift, result.providerPageDrift);
      } else if (pp.inputCostPerToken != null || pp.outputCostPerToken != null) {
        result.providerPageInput = pp.inputCostPerToken;
        result.providerPageOutput = pp.outputCostPerToken;
        result.providerPageUrl = pp.sourceUrl;
        if (pp.outputCostPerToken != null) {
          result.providerPageDrift = calcDrift(dbOutput, pp.outputCostPerToken);
          maxDrift = Math.max(maxDrift, result.providerPageDrift);
        }
      }

      if (pp.cacheTiers?.length) {
        result.officialCacheTiers = pp.cacheTiers;
        const readTiers = pp.cacheTiers.filter((t) => t.label === 'read' || t.label === 'cached-input');
        const writeTiers = pp.cacheTiers.filter((t) => t.label.includes('write'));
        const maxWriteCost = writeTiers.length > 0 ? Math.max(...writeTiers.map((t) => t.costPerToken)) : 0;
        const maxReadCost = readTiers.length > 0 ? Math.max(...readTiers.map((t) => t.costPerToken)) : 0;
        if (maxWriteCost > 0) result.officialCacheWrite = maxWriteCost;
        if (maxReadCost > 0) result.officialCacheRead = maxReadCost;
      } else if (pp.cachedInputCostPerToken !== undefined) {
        result.officialCacheRead = pp.cachedInputCostPerToken;
      }
    }

    if (dbCacheWrite > 0 || dbCacheRead > 0) {
      result.dbCacheWrite = dbCacheWrite;
      result.dbCacheRead = dbCacheRead;
    }
    if (ll && (ll.cacheWriteCostPerToken !== undefined || ll.cacheReadCostPerToken !== undefined)) {
      result.litellmCacheWrite = ll.cacheWriteCostPerToken;
      result.litellmCacheRead = ll.cacheReadCostPerToken;

      // Use LiteLLM cache drift for dimensions NOT covered by official cache tiers.
      // Official tiers may only have 'read' — in that case, still use LiteLLM for write drift.
      const officialHasWrite = (result.officialCacheTiers ?? []).some((t) => t.label.includes('write'));
      const officialHasRead = (result.officialCacheTiers ?? []).some(
        (t) => t.label === 'read' || t.label === 'cached-input'
      );
      let cDrift = 0;
      if (
        !officialHasWrite &&
        dbCacheWrite > 0 &&
        ll.cacheWriteCostPerToken !== undefined &&
        ll.cacheWriteCostPerToken > 0
      ) {
        cDrift = Math.max(cDrift, calcDrift(dbCacheWrite, ll.cacheWriteCostPerToken));
      }
      if (
        !officialHasRead &&
        dbCacheRead > 0 &&
        ll.cacheReadCostPerToken !== undefined &&
        ll.cacheReadCostPerToken > 0
      ) {
        cDrift = Math.max(cDrift, calcDrift(dbCacheRead, ll.cacheReadCostPerToken));
      }
      if (cDrift > 0) {
        result.cacheDrift = cDrift;
        maxDrift = Math.max(maxDrift, cDrift);
      }
    }

    if (result.tieredPricing?.length && pricingUnit === 'per-token') {
      const maxTierInput = Math.max(...result.tieredPricing.map((t) => t.input ?? 0));
      const maxTierOutput = Math.max(...result.tieredPricing.map((t) => t.output ?? 0));
      if (maxTierInput > dbInput && dbInput > 0) {
        result.tierMaxInput = maxTierInput;
        result.tierInputDrift = calcDrift(dbInput, maxTierInput);
        // Note: tier drift is NOT added to maxDrift — it is handled by hasNotHighestTier classification
      }
      if (maxTierOutput > dbOutput && dbOutput > 0) {
        result.tierMaxOutput = maxTierOutput;
        result.tierOutputDrift = calcDrift(dbOutput, maxTierOutput);
      }
    }

    if (result.officialCacheTiers?.length) {
      const writeTiers = result.officialCacheTiers.filter((t) => t.label.includes('write'));
      const readTiers = result.officialCacheTiers.filter((t) => t.label === 'read' || t.label === 'cached-input');

      if (writeTiers.length > 0) {
        const maxWriteCost = Math.max(...writeTiers.map((t) => t.costPerToken));
        if (dbCacheWrite > 0 && dbCacheWrite < maxWriteCost) {
          const drift = calcDrift(dbCacheWrite, maxWriteCost);
          if (drift > 1e-6) {
            result.cacheTierMaxWrite = maxWriteCost;
            result.cacheTierWriteDrift = drift;
            maxDrift = Math.max(maxDrift, drift);
          }
        } else if ((dbCacheWrite === 0 || dbCacheWrite === undefined) && maxWriteCost > 0) {
          result.cacheTierMaxWrite = maxWriteCost;
          result.cacheTierWriteDrift = 1;
          maxDrift = Math.max(maxDrift, 1);
        }
      }

      if (readTiers.length > 0) {
        const maxReadCost = Math.max(...readTiers.map((t) => t.costPerToken));
        if (dbCacheRead > 0 && dbCacheRead < maxReadCost) {
          const drift = calcDrift(dbCacheRead, maxReadCost);
          if (drift > 1e-6) {
            result.cacheTierMaxRead = maxReadCost;
            result.cacheTierReadDrift = drift;
            maxDrift = Math.max(maxDrift, drift);
          }
        } else if ((dbCacheRead === 0 || dbCacheRead === undefined) && maxReadCost > 0) {
          result.cacheTierMaxRead = maxReadCost;
          result.cacheTierReadDrift = 1;
          maxDrift = Math.max(maxDrift, 1);
        }
      }
    }

    if (rate.unitCosts && (rate.inputRate || rate.outputRate)) {
      const unitInputCost = Number(rate.unitCosts.input);
      const unitOutputCost = Number(rate.unitCosts.output);
      const inputRate = Number(rate.inputRate ?? 0);
      const outputRate = Number(rate.outputRate ?? 0);
      result.inputRate = inputRate;
      result.outputRate = outputRate;
      if (unitInputCost > 0 && inputRate > 0) {
        result.inputRateIssue = ((inputRate - unitInputCost) / unitInputCost) * 100;
      }
      if (unitOutputCost > 0 && outputRate > 0) {
        result.outputRateIssue = ((outputRate - unitOutputCost) / unitOutputCost) * 100;
      }
      const PRICING_TOLERANCE = 2;
      result.hasPricingIssue =
        (result.inputRateIssue !== undefined && Math.abs(result.inputRateIssue) > PRICING_TOLERANCE) ||
        (result.outputRateIssue !== undefined && Math.abs(result.outputRateIssue) > PRICING_TOLERANCE);
    } else {
      result.hasPricingIssue = false;
    }

    pickBestCost(result);

    result.deprecated = !!rate.deprecated;

    // When sell price matches the highest tier, drift against base price is expected — not an error.
    // Recalculate drift and margin against the highest tier values.
    if (result.tieredPricing?.length && pricingUnit === 'per-token') {
      const hi = result.tieredPricing[result.tieredPricing.length - 1];
      const sI = result.inputRate ?? dbInput;
      const sO = result.outputRate ?? dbOutput;
      if (aboveOrClose(sI, hi.input) && aboveOrClose(sO, hi.output)) {
        // Recalculate source drift against highest tier
        if (result.litellmInput !== undefined)
          result.litellmDrift = Math.max(calcDrift(sI, hi.input), calcDrift(sO, hi.output));
        if (result.providerPageInput !== undefined)
          result.providerPageDrift = Math.max(calcDrift(sI, hi.input), calcDrift(sO, hi.output));
        if (result.openrouterInput !== undefined)
          result.openrouterDrift = Math.max(calcDrift(sI, hi.input), calcDrift(sO, hi.output));
        // Recalculate margin against highest tier
        if (hi.input > 0) result.inputMargin = ((sI - hi.input) / hi.input) * 100;
        if (hi.output > 0) result.outputMargin = ((sO - hi.output) / hi.output) * 100;
      }
    }

    // Single Data Source: maxDrift only reflects the winning source
    result.maxDrift = singleSourceMaxDrift(result);
    result.exceedsThreshold = result.maxDrift > threshold;

    results.push(result);
  }

  results.sort((a, b) => b.maxDrift - a.maxDrift);
  return results;
}

// ─── Unmatched Official Models (Reverse Lookup) ──────────────────────────────

/**
 * Find official pricing entries that exist in the cache but have no corresponding DB model.
 * Models must also exist in LiteLLM data to be included (dual-source confirmation).
 */
function findUnmatchedOfficialModels(dbRates, officialCache, litellm) {
  const tier2Set = new Set(PROVIDER_TIERS.tier2);
  const relevantProviders = new Set();
  const matchedKeys = new Set();
  const LITELLM_PROVIDERS = ['openai', 'anthropic', 'google', 'gemini', 'deepseek', 'xai'];

  for (const rate of dbRates) {
    const providerName = rate.provider?.name || '';
    const { primaryProvider, primaryModel } = resolveModelMapping(rate.model, providerName);
    if (!tier2Set.has(primaryProvider)) {
      relevantProviders.add(primaryProvider);
    }
    const baseKey = `${primaryProvider}/${primaryModel}`;
    matchedKeys.add(baseKey);
    const fallbacks = modelNameFallbacks(primaryModel);
    for (const fb of fallbacks) {
      matchedKeys.add(`${primaryProvider}/${fb}`);
    }
    if (providerName && providerName !== primaryProvider) {
      matchedKeys.add(`${providerName}/${rate.model}`);
    }
  }

  function lookupLiteLLM(provider, modelId) {
    let ll = litellm.get(`${provider}/${modelId}`);
    if (ll) return ll;
    for (const tryProv of LITELLM_PROVIDERS) {
      const norm = normalizeProvider(tryProv);
      if (norm === provider || tryProv === provider) {
        ll = litellm.get(`${tryProv}/${modelId}`);
        if (ll) return ll;
      }
    }
    const fallbacks = modelNameFallbacks(modelId);
    for (const fb of fallbacks) {
      ll = litellm.get(`${provider}/${fb}`);
      if (ll) return ll;
      for (const tryProv of LITELLM_PROVIDERS) {
        const norm = normalizeProvider(tryProv);
        if (norm === provider || tryProv === provider) {
          ll = litellm.get(`${tryProv}/${fb}`);
          if (ll) return ll;
        }
      }
    }
    return undefined;
  }

  const unmatched = [];
  for (const [key, entry] of officialCache) {
    if (key.includes('::')) continue;
    if (!relevantProviders.has(entry.provider)) continue;
    if (matchedKeys.has(key)) continue;
    const ll = lookupLiteLLM(entry.provider, entry.modelId);
    if (!ll) continue;
    unmatched.push({
      ...entry,
      litellmInput: ll.inputCostPerToken,
      litellmOutput: ll.outputCostPerToken,
      litellmCacheWrite: ll.cacheWriteCostPerToken,
      litellmCacheRead: ll.cacheReadCostPerToken,
    });
  }
  return unmatched;
}

// ─── Official Pricing Cache Builder ──────────────────────────────────────────

/**
 * Build a Map from an OfficialPricingCache entries array.
 * Same logic as loadOfficialPricingCache in fetch-sources.ts.
 */
function buildOfficialPricingMap(entries) {
  const map = new Map();
  for (const entry of entries) {
    const id = entry.modelId || entry.model;
    if (!id) continue;
    const baseKey = `${entry.provider}/${id}`;
    if (entry.modelType) {
      map.set(`${baseKey}::${entry.modelType}`, entry);
    }
    // For the base key, prefer higher-priority types (chatCompletion > lexicon > ... > fineTuning)
    const existing = map.get(baseKey);
    if (!existing || typePriority(entry.modelType) < typePriority(existing.modelType)) {
      map.set(baseKey, entry);
    }
  }
  return map;
}

/**
 * Browser-side Data Fetchers — uses native fetch() API.

 * Rules:

// ─── Mount Point Detection ───────────────────────────────────────────────────

const AIGNE_HUB_DID = 'z8ia3xzq2tMq8CRHfaXj1BTYJyYnEcHbqP8cJ';
var __mountPointCache = {};

/**
 * Detect blocklet mount point from __blocklet__.js (browser-side).
 * Caches per origin to avoid repeated requests.
 */
async function detectMountPointBrowser(hubUrl) {
  try {
    var origin = new URL(hubUrl).origin;
    if (__mountPointCache[origin] !== undefined) return __mountPointCache[origin];
    var resp = await fetch(origin + '/__blocklet__.js?type=json&owner=1&nocache=1');
    if (!resp.ok) {
      __mountPointCache[origin] = '/';
      return '/';
    }
    var data = await resp.json();
    if (data.componentMountPoints && Array.isArray(data.componentMountPoints)) {
      var hub = data.componentMountPoints.find(function (c) {
        return c.did === AIGNE_HUB_DID;
      });
      if (hub && hub.mountPoint) {
        __mountPointCache[origin] = hub.mountPoint;
        return hub.mountPoint;
      }
    }
    __mountPointCache[origin] = '/';
    return '/';
  } catch (e) {
    __mountPointCache[origin] = '/';
    return '/';
  }
}

/**
 * Build API URL with correct mount point (browser-side).
 */
async function buildApiUrlBrowser(hubUrl, apiPath) {
  var origin = new URL(hubUrl).origin;
  var mp = await detectMountPointBrowser(hubUrl);
  if (mp === '/') return origin + apiPath;
  return origin + mp.replace(/\/$/, '') + apiPath;
}

// ─── Hub DB Rates ────────────────────────────────────────────────────────────

/**
 * Fetch DB rates from Hub API (paginated).
 * @param {string} hubUrl - Hub base URL
 * @param {string} [token] - Auth token (optional for read)
 * @returns {Promise<Array>} DbRate-like objects
 */
async function fetchDbRatesBrowser(hubUrl, token) {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const all = [];
  let page = 1;
  const apiBase = await buildApiUrlBrowser(hubUrl, '/api/ai-providers/model-rates');
  while (true) {
    const resp = await fetch(apiBase + '?pageSize=100&page=' + page + '&includeDeprecated=true', { headers });
    if (!resp.ok) {
      const txt = await resp.text().catch(function () {
        return resp.statusText;
      });
      throw new Error('DB rates: HTTP ' + resp.status + ': ' + txt.slice(0, 200));
    }
    const data = await resp.json();
    const list = data.list || data.data?.list || [];
    all.push(...list);
    if (list.length < 100) break;
    page++;
  }
  return all;
}

// ─── LiteLLM ─────────────────────────────────────────────────────────────────

const LITELLM_RAW_URL = 'https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json';

/**
 * Fetch LiteLLM pricing data and build a Map<string, ExternalRate>.
 * @returns {Promise<Map<string, object>>}
 */
async function fetchLiteLLMBrowser() {
  const map = new Map();
  const resolutionVariants = new Map();

  const resp = await fetch(LITELLM_RAW_URL);
  if (!resp.ok) throw new Error('LiteLLM: HTTP ' + resp.status);
  const data = await resp.json();

  for (const [key, val] of Object.entries(data)) {
    if (key === 'sample_spec') continue;

    // Resolution variant keys
    const resMatch = key.match(/^(?:azure\/)?(\w+)\/([\dx-]+)\/(.+)$/);
    if (resMatch && val.mode === 'image_generation') {
      const [, quality, sizeRaw, baseModel] = resMatch;
      const size = sizeRaw.replace(/-/g, '');
      const cost =
        (val.input_cost_per_image ?? val.output_cost_per_image ?? val.input_cost_per_pixel)
          ? (val.input_cost_per_pixel || 0) * sizeRaw.split('-x-').reduce((a, b) => a * parseInt(b), 1)
          : undefined;
      if (cost !== undefined) {
        const litellmProvider = val.litellm_provider || '';
        const normalizedProv = normalizeProvider(litellmProvider) || litellmProvider;
        const baseKey = normalizedProv + '/' + baseModel;
        if (!resolutionVariants.has(baseKey)) resolutionVariants.set(baseKey, []);
        resolutionVariants.get(baseKey).push({ quality, size, costPerImage: cost });
      }
      continue;
    }

    let hasAnyPricing = false;
    const rate = {};

    if (val.input_cost_per_token !== undefined) {
      rate.inputCostPerToken = val.input_cost_per_token;
      hasAnyPricing = true;
    }
    if (val.output_cost_per_token !== undefined) {
      rate.outputCostPerToken = val.output_cost_per_token;
      hasAnyPricing = true;
    }
    if (val.cache_creation_input_token_cost !== undefined)
      rate.cacheWriteCostPerToken = val.cache_creation_input_token_cost;
    if (val.cache_read_input_token_cost !== undefined) rate.cacheReadCostPerToken = val.cache_read_input_token_cost;
    if (val.output_cost_per_image !== undefined) {
      rate.outputCostPerImage = val.output_cost_per_image;
      hasAnyPricing = true;
    }
    if (val.input_cost_per_image !== undefined) {
      rate.inputCostPerImage = val.input_cost_per_image;
      hasAnyPricing = true;
    }
    if (val.input_cost_per_image_token !== undefined) {
      rate.inputCostPerImageToken = val.input_cost_per_image_token;
      hasAnyPricing = true;
    }
    if (val.output_cost_per_image_token !== undefined) {
      rate.outputCostPerImageToken = val.output_cost_per_image_token;
      hasAnyPricing = true;
    }
    if (val.output_cost_per_video_per_second !== undefined) {
      rate.outputCostPerVideoPerSecond = val.output_cost_per_video_per_second;
      hasAnyPricing = true;
    } else if (val.output_cost_per_second !== undefined && val.mode === 'video_generation') {
      rate.outputCostPerVideoPerSecond = val.output_cost_per_second;
      hasAnyPricing = true;
    }

    // Tiered pricing
    const tiers = [];
    for (const tierKey of Object.keys(val)) {
      const tierMatch = tierKey.match(/^(input|output)_cost_per_token_above_(\d+k)_tokens$/);
      if (tierMatch) {
        const [, direction, threshold] = tierMatch;
        let existing = tiers.find((t) => t.threshold === threshold);
        if (!existing) {
          existing = { threshold };
          tiers.push(existing);
        }
        if (direction === 'input') existing.input = val[tierKey];
        else existing.output = val[tierKey];
      }
    }
    if (tiers.length > 0) rate.tieredPricing = tiers;

    if (!hasAnyPricing) continue;

    const litellmProvider = val.litellm_provider || '';
    const parts = key.split('/');
    const modelName = parts.length > 1 ? parts.slice(1).join('/') : key;

    map.set(litellmProvider + '/' + modelName, rate);

    const normalizedProv = normalizeProvider(litellmProvider);
    if (normalizedProv && normalizedProv !== litellmProvider) {
      const normalizedKey = normalizedProv + '/' + modelName;
      if (!map.has(normalizedKey)) map.set(normalizedKey, rate);
    }

    if (litellmProvider === 'openrouter' && key.startsWith('openrouter/')) {
      map.set(key, rate);
    }
  }

  // Merge resolution variants
  for (const [baseKey, variants] of resolutionVariants) {
    const existing = map.get(baseKey);
    if (existing) existing.resolutionTiers = variants;
    for (const [k, v] of map) {
      if (k.endsWith('/' + baseKey.split('/').pop()) && !v.resolutionTiers) {
        v.resolutionTiers = variants;
      }
    }
  }

  return map;
}

const OPENROUTER_API_URL = 'https://openrouter.ai/api/v1/models';

/**
 * Fetch OpenRouter pricing data.
 * @returns {Promise<Map<string, object>>}
 */
async function fetchOpenRouterBrowser() {
  const map = new Map();
  const resp = await fetch(OPENROUTER_API_URL);
  if (!resp.ok) throw new Error('OpenRouter: HTTP ' + resp.status);
  const json = await resp.json();
  const models = json.data || [];

  for (const model of models) {
    if (!model.pricing?.prompt || !model.pricing?.completion) continue;
    const slashIdx = model.id.indexOf('/');
    if (slashIdx === -1) continue;
    const prefix = model.id.substring(0, slashIdx);
    const modelName = model.id.substring(slashIdx + 1);
    const provider = normalizeProvider(prefix) || prefix;
    const input = parseFloat(model.pricing.prompt);
    const output = parseFloat(model.pricing.completion);
    if (!isNaN(input) && !isNaN(output)) {
      const rate = { inputCostPerToken: input, outputCostPerToken: output };
      map.set(provider + '/' + modelName, rate);
      if (provider !== prefix) {
        map.set(prefix + '/' + modelName, rate);
      }
    }
  }
  return map;
}

/**
 * Load official pricing from a URL or embedded data.
 * @param {string|object} source - URL string or already-parsed data object
 * @returns {Promise<{entries: Array, timestamp: number}|null>}
 */
async function loadOfficialPricingBrowser(source) {
  if (!source) return null;
  if (typeof source === 'object') return source;
  try {
    const resp = await fetch(source);
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

      if(m.cacheTiers&&m.cacheTiers.length>0){var readTier=m.cacheTiers.find(function(t){return t.label==='read'||t.label==='cached-input'});var readVal=readTier?fmtMTok(readTier.costPerToken):fmtMTok(m.cachedInputCostPerToken);var tierDetails=m.cacheTiers.map(function(t){return t.label+': '+fmtMTok(t.costPerToken)}).join('&#10;');cacheHtml='<span class="mono" title="'+tierDetails+'">'+readVal+'</span>'}
      else if(m.cachedInputCostPerToken!=null)cacheHtml='<span class="mono">'+fmtMTok(m.cachedInputCostPerToken)+'</span>';
      var hasLL=m.litellmInput!=null||m.litellmOutput!=null;
      // Build popover
      var pop='<div class="pop" id="pop-'+umId+'"><div class="parr"></div><div class="phd">'+mKey+'</div>';
      pop+='<table class="ptbl"><thead><tr><th>来源</th><th>Input</th><th>Output</th><th>Cache Write</th><th>Cache Read</th></tr></thead><tbody>';
      pop+='<tr><td><span class="sb sb-pp">官方</span>'+(ppUrl?' <a href="'+ppUrl+'" target="_blank" class="lk">↗</a>':'')+'</td>';
      pop+='<td class="mono">'+fmtMTok(m.inputCostPerToken)+'</td><td class="mono">'+fmtMTok(m.outputCostPerToken)+'</td>';
      var officialCW=m.cacheTiers?.find(function(t){return t.label==='write'})?.costPerToken;
      var officialCR=m.cachedInputCostPerToken??(m.cacheTiers?.find(function(t){return t.label==='read'||t.label==='cached-input'})?.costPerToken);
      pop+='<td class="mono">'+(officialCW?fmtMTok(officialCW):'<span class="na">-</span>')+'</td>';
      pop+='<td class="mono">'+(officialCR?fmtMTok(officialCR):'<span class="na">-</span>')+'</td></tr>';
      if(hasLL){pop+='<tr><td><span class="sb sb-ll">LiteLLM</span></td>';pop+='<td class="mono">'+fmtMTok(m.litellmInput)+'</td><td class="mono">'+fmtMTok(m.litellmOutput)+'</td>';pop+='<td class="mono">'+fmtMTok(m.litellmCacheWrite)+'</td><td class="mono">'+fmtMTok(m.litellmCacheRead)+'</td></tr>'}
      pop+='</tbody></table>';
      if(m.cacheTiers&&m.cacheTiers.length>0){pop+='<div class="pcache"><span class="pcache-h">官方 Cache Tiers</span>';for(var tier of m.cacheTiers)pop+='<span class="pcache-item"><span class="pcache-lbl">'+tier.label+'</span><span class="mono">'+fmtMTok(tier.costPerToken)+'</span></span>';pop+='</div>'}
      pop+='</div>';
      // Build badges

      else badges+='<span class="sb sb-pp">官方</span>';
