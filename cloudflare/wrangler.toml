name = "aigne-hub"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "aigne-hub-dev"
database_id = "local"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "local"

[[services]]
binding = "BLOCKLET_SERVICE"
service = "blocklet-service"
entrypoint = "BlockletServiceRPC"

[[services]]
binding = "PAYMENT_KIT"
service = "payment-kit-staging"

[assets]
directory = "frontend/dist"
binding = "ASSETS"
not_found_handling = "none"

[vars]
ENVIRONMENT = "development"
BASE_URL = "http://aigne.localhost:8092"
INSTANCE_NAME = "AIGNE Hub"
# CREDENTIAL_ENCRYPTION_KEY must be set via: wrangler secret put CREDENTIAL_ENCRYPTION_KEY
# AI Gateway: set these to route provider calls through CF AI Gateway
# AI_GATEWAY_ACCOUNT_ID = ""
# AI_GATEWAY_ID = ""

[triggers]
crons = [
  "* * * * *",      # every minute: flush buffered meter events to Payment Kit
  "0 * * * *",      # hourly: stats aggregation + retry queue
  "0 2 * * *",      # daily: archive + reconcile + health check
]

# --- Production ---
[env.production]
name = "aigne-hub-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "aigne-hub-production"
database_id = "624c2a67-39d3-49b7-be41-1d9a59de3645"

[[env.production.kv_namespaces]]
binding = "AUTH_KV"
id = "7ea86243a879402aa703f6c35e4ade0a"

[env.production.assets]
directory = "frontend/dist"
binding = "ASSETS"
not_found_handling = "none"

[env.production.vars]
ENVIRONMENT = "production"
BASE_URL = "https://aigne-hub.arcblock.io"

# Production crons: free plan 5-cron limit shared across all workers
[env.production.triggers]
crons = [
  "0 * * * *",    # hourly: stats aggregation + retry queue + flush meter events
  "0 2 * * *",    # daily: archive + reconcile + health check
]
